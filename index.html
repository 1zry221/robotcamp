<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX 戰術決策矩陣核心</title>
    <!-- 引入科技感字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a1128;
            --panel-bg: rgba(13, 27, 42, 0.85);
            --border-color: #00f2fe;
            --text-color: #e0e1dd;
            --accent-color: #00f2fe;
            --danger-color: #ff3366;
            --funds-color: #ffb703;
            --stability-color: #00f5d4;
            --tech-color: #00b4d8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
            position: relative;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
        }

        .mode-container {
            display: none;
        }

        .active-mode {
            display: block;
        }

        /* 儀表板與卡片佈局 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .card.active-turn {
            border-color: var(--border-color);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
            background: rgba(13, 27, 42, 0.95);
        }

        .card.active-turn::before {
            content: "CURRENT TURN";
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--border-color);
            color: #000;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: 'Orbitron', sans-serif;
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        /* 圓環儀表板容器 */
        .stats-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex: 1;
        }

        /* 科技感圓環核心 */
        .circle-progress {
            position: relative;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .circle-value {
            position: absolute;
            font-family: 'Orbitron', monospace;
            font-size: 1.15rem;
            font-weight: bold;
            z-index: 2;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8892b0;
            font-weight: bold;
        }

        /* 決策區域 */
        .decision-panel {
            background: rgba(10, 20, 40, 0.9);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .event-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 4px;
        }

        .options-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background: linear-gradient(135deg, #1f3a60 0%, #0d1b2a 100%);
            border: 1px solid rgba(0, 242, 254, 0.4);
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .option-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #00f2fe 0%, #1f3a60 100%);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 主持人控制台 */
        .host-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .control-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
        }

        .log-panel {
            background: #050b14;
            border: 1px solid #1f3a60;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        .log-content {
            overflow-y: auto;
            flex: 1;
            color: #00ff66;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .btn {
            background: #1f3a60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-danger { background: var(--danger-color); }
        .btn-success { background: #00f5d4; color: #000; }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 10px;
            background: #0d1b2a;
            border: 1px solid #1f3a60;
            color: white;
            border-radius: 4px;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #333;
        }

        .status-waiting { background: #555; color: #ccc; }
        .status-active { background: var(--accent-color); color: #000; animation: blink 1.5s infinite; }

        @keyframes blink {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1 id="game-title">MATRIX STRATEGIC SYSTEM</h1>
        <div style="margin-top: 5px; font-family: 'Orbitron'; color: #8892b0;">
            ROUND: <span id="global-round" style="color:var(--accent-color)">1</span> 
            | STATUS: <span id="global-status" style="color:#00ff66">ONLINE</span>
        </div>
    </header>

    <!-- 玩家端介面 -->
    <div id="team-mode" class="mode-container">
        <div id="team-dashboard" class="dashboard"></div>
        <div id="team-decision-zone" class="decision-panel" style="display: none;">
            <h2 id="decision-title">⚡ 決策矩陣已解鎖</h2>
            <p id="decision-desc" class="event-text">等待讀取動態劇本...</p>
            <div id="decision-options" class="options-list"></div>
        </div>
        <div id="team-wait-zone" class="decision-panel" style="text-align: center; color: #8892b0;">
            <p id="wait-msg">📡 正在同步矩陣數據，等待通訊協定解鎖...</p>
        </div>
    </div>

    <!-- 主持人端介面 -->
    <div id="host-mode" class="mode-container">
        <div class="host-grid">
            <div class="control-panel">
                <h2>🏛️ 矩陣控制核心 (Host Control)</h2>
                <hr style="border-color:#1f3a60; margin: 15px 0;">
                
                <div class="form-group">
                    <label>當前輪次管理</label>
                    <select id="host-round-select">
                        <option value="1">第一輪：資源短缺危機</option>
                        <option value="2">第二輪：意識形態分歧</option>
                        <option value="3">第三輪：全域危機升級</option>
                        <option value="4">第四輪：最終終局決戰</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>當前行動順序配置</label>
                    <input type="text" id="host-order-input" value="A,B,C,D" placeholder="例如: A,B,C,D">
                    <small style="color:#8892b0">A:政府 | B:科學家 | C:資方 | D:勞工 (逗號隔開)</small>
                </div>

                <div style="display:flex; gap: 10px; margin-bottom: 25px;">
                    <button class="btn btn-success" id="btn-sync-host">更新配置並同步</button>
                    <button class="btn" id="btn-skip-turn">強制推進下一順位 (Skip)</button>
                    <button class="btn btn-danger" id="btn-reset-game">全域資料重設 (Reset)</button>
                </div>

                <h3>📊 即時全域矩陣數據</h3>
                <div id="host-dashboard" class="dashboard" style="margin-top:15px;"></div>
            </div>

            <div class="log-panel">
                <h3>🌲 世界線動態日誌</h3>
                <hr style="border-color:#1f3a60; margin: 10px 0;">
                <div id="log-content" class="log-content"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // NTFY 廣播設定[cite: 1]
    const NTFY_TOPIC = 'matrix_tactical_sync_core_9955'; 
    const NTFY_URL = `https://ntfy.sh/${NTFY_TOPIC}`;

    // 初始世界線設定（更新為指定數值）
    const initialState = {
        version: 1,
        currentRound: 1,
        currentTurnIndex: 0,
        turnOrder: ['A', 'B', 'C', 'D'],
        teams: {
            A: { name: '🏛️ 政府高層', funds: 30, stability: 70, tech: 20 },

        },
        history: ["系統初始化：初始矩陣天平建立。"]

    let systemState = JSON.parse(JSON.stringify(initialState));
    let currentMode = 'team'; 
    let myTeamCode = null;    

    // 4輪嵌套式分歧劇本[cite: 1]

                options: [
                    { text: "啟動中樞清洗協議，與整座城市同歸於盡。", effect: { A: { stability: 100 }, B: { stability: -50 }, C: { stability: -50 }, D: { stability: -50 } }, log: "政府選擇最終淨化，玉石俱焚！" },
                    { text: "退位並交出所有權利，和平過渡給當前最強盛的陣營。", effect: { A: { stability: -50 }, D: { stability: 20 }, B: { stability: 20 } }, log: "舊政府宣告解體，時代變了。" }
                ]
            },
            B: {
                desc: "真理之門已開，人類的未來將走向何方？",
                options: [
                    { text: "[機械飛升] 全員意識上傳母體矩陣，拋棄肉身。", effect: { B: { tech: 100 }, A: { funds: -50 }, D: { funds: -50 } }, log: "科學家宣告人類飛升，肉身時代終結。" },
                    { text: "[文明火種] 銷毀所有危險技術，帶著歷史文檔重返農耕時代。", effect: { B: { tech: -100, stability: 50 }, D: { stability: 30 } }, log: "科學界自我封印技術，回歸自然始源。" }
                ]
            },
            C: {
                desc: "財富已經是一串無意義的數字，世界線即將收束。",
                options: [
                    { text: "[方舟計畫] 啟動巨型火箭，帶著全城財富與核心精英逃離地球。", effect: { C: { funds: 100 }, A: { stability: -40 }, D: { stability: -40 } }, log: "資方方舟破空而去，留下一片廢墟。" },
                    { text: "[全體買斷] 用金錢買下全世界的剩餘資源，建立賽博企業帝國。", effect: { C: { funds: 50, tech: 30 }, A: { stability: -20 } }, log: "資方成功買斷世界，企業帝國降臨。" }
                ]
            },
            D: {
                desc: "命運掌握在自己手裡，勞動者將迎來怎樣的黎明？",
                options: [
                    { text: "[全球一體] 徹底打破階級，建立全人類命運共同體。", effect: { D: { stability: 100 }, A: { stability: -20 }, C: { funds: -50 } }, log: "勞工成功建立大同世界，鐘聲敲響！" },
                    { text: "[廢土狂歡] 推翻一切體制，擁抱絕對自由的混亂無政府廢土。", effect: { D: { funds: 30, tech: -20 }, A: { stability: -50 }, B: { stability: -50 }, C: { stability: -50 } }, log: "全城陷入絕對混亂，廢土朋克時代開啟！" }
                ]
            }
        }
    };

    // 初始化與路由控制
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const team = params.get('team');

        if (mode === 'host') {
            currentMode = 'host';
            document.getElementById('host-mode').classList.add('active-mode');
            initHostEvents();
        } else {
            currentMode = 'team';
            myTeamCode = team || 'A'; 
            document.getElementById('team-mode').classList.add('active-mode');
            document.getElementById('game-title').innerText = `MATRIX // TEAM [ ${myTeamCode} ]`;
        }

        // 啟動 ntfy 即時監聽長連線[cite: 1]
        initSSE();
        // 首次手動自遠端拉取狀態更新畫面
        pullState();
    });

    // 建立動態發光圓環的核心函式 (移除了 clamp，新增破百與負數視覺處理)
    function createCircleHTML(label, value, baseColor) {
        let angle = 0;
        let bgStyle = "";
        let displayColor = baseColor;

        if (value > 100) {
            // 破百：圓環全滿，並加上強烈的同色外發光效果
            angle = 360;
            bgStyle = `background: radial-gradient(circle, #0d1b2a 58%, transparent 59%), 
                        conic-gradient(${baseColor} 0deg, ${baseColor} 360deg); 
                        box-shadow: 0 0 25px ${baseColor};`;
        } else if (value < 0) {
            // 負數：圓環歸零，顏色強制切換為警告紅色
            angle = 0;
            displayColor = 'var(--danger-color)';
            bgStyle = `background: radial-gradient(circle, #0d1b2a 58%, transparent 59%), 
                        conic-gradient(var(--danger-color) 0deg, var(--danger-color) 360deg);
                        box-shadow: 0 0 15px rgba(255,51,102,0.3);`;
        } else {
            // 正常 0 ~ 100 區間：百分比轉成 360 度角
            angle = (value / 100) * 360;
            bgStyle = `background: radial-gradient(circle, #0d1b2a 58%, transparent 59%), 
                        conic-gradient(${baseColor} 0deg, ${baseColor} ${angle}deg, #1f3a60 ${angle}deg, #1f3a60 360deg);`;
        }

        return `
            <div class="stat-box">
                <div class="circle-progress" style="${bgStyle}">
                    <div class="circle-value" style="color: ${displayColor}">${value}</div>
                </div>
                <div class="stat-label">${label}</div>
            </div>
        `;
    }

    // 核心渲染邏輯：將數據繪製到畫面上
    function render() {
        document.getElementById('global-round').innerText = systemState.currentRound;
        const currentActiveTeam = systemState.turnOrder[systemState.currentTurnIndex];

        // 渲染日誌區
        const logContent = document.getElementById('log-content');
        if (logContent) {
            logContent.innerHTML = systemState.history.map(item => `<div>&gt; ${item}</div>`).join('');
            logContent.scrollTop = logContent.scrollHeight;
        }

        // 決定要渲染哪個面板
        const targetDashboard = currentMode === 'host' ? 'host-dashboard' : 'team-dashboard';
        const dashboardEl = document.getElementById(targetDashboard);
        
        if (dashboardEl) {
            dashboardEl.innerHTML = '';
            Object.keys(systemState.teams).forEach(code => {
                const team = systemState.teams[code];
                const isActive = (code === currentActiveTeam);
                
                const card = document.createElement('div');
                card.className = `card ${isActive ? 'active-turn' : ''}`;
                
                // 動態生成三個解鎖限制的圓環
                const fundsCircle = createCircleHTML('資產 FUNDS', team.funds, 'var(--funds-color)');
                const stabilityCircle = createCircleHTML('穩定 STABILITY', team.stability, 'var(--stability-color)');
                const techCircle = createCircleHTML('科技 TECH', team.tech, 'var(--tech-color)');

                card.innerHTML = `
                    <h2>${team.name} <span class="status-badge ${isActive ? 'status-active' : 'status-waiting'}">${isActive ? 'DECIDING' : 'WAIT'}</span></h2>
                    <div class="stats-container">
                        ${fundsCircle}
                        ${stabilityCircle}
                        ${techCircle}
                    </div>
                `;
                dashboardEl.appendChild(card);
            });
        }

        // 玩家端決策邏輯
        if (currentMode === 'team') {
            const isMyTurn = (myTeamCode === currentActiveTeam);
            const decisionZone = document.getElementById('team-decision-zone');
            const waitZone = document.getElementById('team-wait-zone');

            if (isMyTurn) {
                decisionZone.style.display = 'block';
                waitZone.style.display = 'none';

                const roundData = gameScript[systemState.currentRound];
                const myScript = roundData ? roundData[myTeamCode] : null;

                if (myScript) {
                    document.getElementById('decision-title').innerText = `⚡ ${systemState.teams[myTeamCode].name} - 矩陣決策時間`;
                    document.getElementById('decision-desc').innerText = myScript.desc;
                    
                    const optionsContainer = document.getElementById('decision-options');
                    optionsContainer.innerHTML = '';
                    
                    myScript.options.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.innerText = opt.text;
                        btn.onclick = () => executeDecision(opt);
                        optionsContainer.appendChild(btn);
                    });
                } else {
                    document.getElementById('decision-desc').innerText = "本輪劇本已完結，等待主持人開啟下一輪。";
                    document.getElementById('decision-options').innerHTML = '';
                }
            } else {
                decisionZone.style.display = 'none';
                waitZone.style.display = 'block';
                document.getElementById('wait-msg').innerText = `📡 正在同步數據。目前輪到 [ ${systemState.teams[currentActiveTeam]?.name || currentActiveTeam} ] 進行全面決策...`;
            }
        }
    }

    // 執行決策核心邏輯 (移除數值 clamp 限制)
    function executeDecision(option) {
        systemState.version += 1;
        
        // 全域套用數值變更，允許破百與負數
        if (option.effect) {
            Object.keys(option.effect).forEach(tCode => {
                const eff = option.effect[tCode];
                if (systemState.teams[tCode]) {
                    if (eff.funds) systemState.teams[tCode].funds += eff.funds;
                    if (eff.stability) systemState.teams[tCode].stability += eff.stability;
                    if (eff.tech) systemState.teams[tCode].tech += eff.tech;
                }
            });
        }

        // 寫入歷史日誌
        const currentActiveTeam = systemState.turnOrder[systemState.currentTurnIndex];
        systemState.history.push(`[Round ${systemState.currentRound}] ${systemState.teams[currentActiveTeam].name} 做出決策：${option.log}`);

        // 推進順位邏輯
        if (systemState.currentTurnIndex < systemState.turnOrder.length - 1) {
            systemState.currentTurnIndex += 1;
        } else {
            systemState.history.push(`—— 第 ${systemState.currentRound} 輪所有陣營行動完畢。請主持人手動推進下一輪 ——`);
        }

        pushState();
    }

    // 主持人後台事件監聽
    function initHostEvents() {
        document.getElementById('btn-sync-host').addEventListener('click', () => {
            const rd = parseInt(document.getElementById('host-round-select').value);
            const orderStr = document.getElementById('host-order-input').value;
            const orderArr = orderStr.split(',').map(s => s.trim().toUpperCase());

            systemState.version += 1;
            systemState.currentRound = rd;
            systemState.turnOrder = orderArr;
            systemState.currentTurnIndex = 0;
            systemState.history.push(`[後台介入] 主持人手動重置為第 ${rd} 輪，行動順序更動為: ${orderArr.join(' &gt; ')}`);
            
            pushState();
        });

        document.getElementById('btn-skip-turn').addEventListener('click', () => {
            systemState.version += 1;
            const currentActiveTeam = systemState.turnOrder[systemState.currentTurnIndex];
            systemState.history.push(`[後台介入] 主持人強制跳過了 ${systemState.teams[currentActiveTeam]?.name || currentActiveTeam} 的回合。`);
            
            if (systemState.currentTurnIndex < systemState.turnOrder.length - 1) {
                systemState.currentTurnIndex += 1;
            } else {
                systemState.history.push(`—— 全輪次強行終止。請手動進入下一輪 ——`);
            }
            pushState();
        });

        document.getElementById('btn-reset-game').addEventListener('click', () => {
            if (confirm('⚠️ 確定要將全域數據初始化重設嗎？此動作無法復原！')) {
                systemState = JSON.parse(JSON.stringify(initialState));
                systemState.version = Date.now(); // 用時間戳確保版本絕對覆蓋
                pushState();
            }
        });
    }

    // 網路即時通訊層：同步狀態至雲端 (POST)[cite: 1]
    function pushState() {
        render(); // 本地預先渲染增加流暢感
        fetch(NTFY_URL, {
            method: 'POST',
            body: JSON.stringify(systemState),
            headers: { 'X-Title': 'MATRIX_STATE_UPDATE' }
        }).catch(err => console.error("網路通訊同步失敗:", err));
    }

    // 網路即時通訊層：主動向雲端撈取快照[cite: 1]
    function pullState() {
        fetch(`${NTFY_URL}/json?poll=1`)
        .then(res => res.text())
        .then(text => {
            if(!text.trim()) return;
            const lines = text.trim().split('\n');
            for(let i = lines.length - 1; i >= 0; i--) {
                try {
                    const msg = JSON.parse(lines[i]);
                    if (msg.event === 'message' && msg.message) {
                        const incoming = JSON.parse(msg.message);
                        if (incoming.version > systemState.version) {
                            systemState = incoming;
                            render();
                            break;
                        }
                    }
                } catch(e) {}
            }
        });
    }

    // 網路即時通訊層：建立 SSE 長連線即時監聽[cite: 1]
    function initSSE() {
        const eventSource = new EventSource(`${NTFY_URL}/sse`);
        eventSource.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.message) {
                    const incomingState = JSON.parse(data.message);
                    // 核心高併發防衝撞：永遠只認最新版本號[cite: 1]
                    if (incomingState.version > systemState.version) {
                        systemState = incomingState;
                        render();
                    }
                }
            } catch (err) {
                // 忽略非 JSON 系統通訊封包
            }
        };
        eventSource.onerror = () => {
            setTimeout(initSSE, 3000); // 斷線重連機制
        };
    }
</script>
