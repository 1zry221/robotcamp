<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRITICAL LINKAGE: QUANTUM CORE</title>
    <style>
        /* 全域賽博朋克底色 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace, "微軟正黑體"; }
        body, html { width: 100%; height: 100%; background-color: #050508; color: #00f0ff; overflow: hidden; position: relative; }
        
        /* CRT 掃描線與暗角特效 */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%); z-index: 998; pointer-events: none;
        }

        /* 背景 Canvas */
        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; }

        /* 主玻璃面板 */
        .hud-container {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; z-index: 10;
            background: rgba(10, 15, 24, 0.65);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.1);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            display: grid; padding: 20px; gap: 20px;
        }

        /* 隊員端佈局 (HUD 圖片還原) */
        .team-layout { grid-template-columns: 1fr 2fr 1.5fr; grid-template-rows: 1fr 2fr; height: 100%; }

        /* 左側能量條 */
        .status-bars { grid-row: 1 / span 2; display: flex; flex-direction: column; justify-content: space-around; padding-right: 10px; }
        .bar-container { display: flex; flex-direction: column; gap: 5px; }
        .bar-label { font-size: 14px; font-weight: bold; text-shadow: 0 0 5px currentColor; display: flex; justify-content: space-between;}
        .bar-outer { width: 100%; height: 25px; border: 1px solid rgba(0, 240, 255, 0.5); padding: 2px; background: rgba(0,0,0,0.4); position: relative; }
        .bar-inner { height: 100%; background: #00f0ff; width: 70%; transition: width 0.8s cubic-bezier(0.1, 0.8, 0.3, 1); box-shadow: 0 0 10px currentColor; }
        .bar-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 85%, rgba(5,5,8,0.7) 85%); background-size: 8% 100%; }

        /* 中央雷達與徽章 */
        .center-radar { grid-row: 1 / span 2; display: flex; justify-content: center; align-items: center; position: relative; }
        .radar-svg { width: 85%; height: 85%; animation: rotateRadar 20s linear infinite; opacity: 0.7; }
        .badge-img {
            position: absolute; width: 45%; height: 45%; object-fit: contain; border-radius: 50%;
            mix-blend-mode: multiply; filter: drop-shadow(0 0 8px rgba(0,240,255,0.6)) contrast(1.2);
            z-index: 12; background: rgba(10, 15, 24, 0.1);
        }

        /* 右上 MISSION 區塊 */
        .mission-panel {
            grid-column: 3; border: 1px solid rgba(0, 240, 255, 0.3); background: rgba(0,0,0,0.3);
            padding: 15px; clip-path: polygon(0 0, 90% 0, 100% 15%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
        }
        .mission-title { font-size: 16px; color: #ff7300; text-shadow: 0 0 5px #ff7300; border-bottom: 1px dashed rgba(255,115,0,0.4); padding-bottom: 5px; }
        .mission-text { font-size: 13px; line-height: 1.4; color: #e0f7fa; min-height: 40px; }
        .option-btn {
            display: block; width: 100%; padding: 8px; background: rgba(0, 240, 255, 0.1);
            border: 1px solid #00f0ff; color: #00f0ff; text-align: left; cursor: pointer; font-size: 12px;
            transition: all 0.3s; clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
            margin-top: 5px;
        }
        .option-btn:hover { background: rgba(0, 240, 255, 0.3); box-shadow: 0 0 10px rgba(0,240,255,0.5); transform: translateX(3px); }

        /* 右下 DECORATION 區塊 */
        .decor-panel { grid-column: 3; border: 1px solid rgba(0, 240, 255, 0.2); padding: 15px; font-size: 11px; color: rgba(0,240,255,0.5); display: flex; flex-direction: column; justify-content: space-between; }
        
        /* 主持人端佈局 */
        .host-layout { display: flex; flex-direction: column; height: 100%; gap: 15px; }
        .host-header { font-size: 24px; text-shadow: 0 0 10px #00f0ff; text-align: center; border-bottom: 2px solid #00f0ff; padding-bottom: 10px; }
        .host-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .control-box { border: 1px dashed rgba(0,240,255,0.5); padding: 15px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px; }
        .host-btn { padding: 12px; background: #ff7300; border: none; color: white; font-weight: bold; cursor: pointer; text-align: center; box-shadow: 0 0 10px rgba(255,115,0,0.5); }
        .host-btn:hover { background: #ff9100; }
        select { background: #0a0f18; color: #00f0ff; border: 1px solid #00f0ff; padding: 8px; width: 100%; font-size: 14px; }

        /* 陣營色彩覆蓋機制 */
        .theme-A { --color: #ffcc00; color: var(--color); } /* 政府: 金 */
        .theme-B { --color: #00ffcc; color: var(--color); } /* 科學家: 水藍/綠 */
        .theme-C { --color: #cc00ff; color: var(--color); } /* 資方: 紫 */
        .theme-D { --color: #ff3333; color: var(--color); } /* 勞工: 紅 */
        .theme-A .bar-inner, .theme-A .option-btn { background: rgba(255,204,0,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 10px var(--color); }
        .theme-B .bar-inner, .theme-B .option-btn { background: rgba(0,255,204,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 10px var(--color); }
        .theme-C .bar-inner, .theme-C .option-btn { background: rgba(220,0,255,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 10px var(--color); }
        .theme-D .bar-inner, .theme-D .option-btn { background: rgba(255,51,51,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 10px var(--color); }
        .theme-A .hud-container { border-color: rgba(255,204,0,0.3); }
        .theme-B .hud-container { border-color: rgba(0,255,204,0.3); }
        .theme-C .hud-container { border-color: rgba(220,0,255,0.3); }
        .theme-D .hud-container { border-color: rgba(255,51,51,0.3); }

        /* 動態轉場特效 */
        @keyframes rotateRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .shake { animation: shakeEffect 0.4s ease-in-out; }
        @keyframes shakeEffect {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 5px); border-color: #ff3333; }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
        }
        .glitch-flash { background: rgba(255, 51, 51, 0.4) !important; transition: background 0.1s; }
    </style>
</head>
<body class="theme-B"> <!-- 預設為科學家主題，JS會根據動態切換 -->

    <canvas id="particleCanvas"></canvas>

    <!-- 主畫面板區塊 -->
    <div id="hudMain" class="hud-container">
        <!-- 內容由 JavaScript 根據網址 ?mode=host 或 ?mode=team 動態渲染 -->
    </div>

    <script>
        // --- 核心資料庫設定 (模擬後台，串接 GAS API 時可替換為 Fetch) ---
        let globalData = {
            A: { name: "🏛️ 政府高層", funds: 80, stability: 90, tech: 40, img: "https://i.imgur.com/KdfE2dL.jpg" }, // 宮殿
            B: { name: "🧪 社團科學家", funds: 50, stability: 60, tech: 95, img: "https://i.imgur.com/KdfE47L.jpg" }, // 燒瓶
            C: { name: "🏢 工廠資方", funds: 95, stability: 50, tech: 60, img: "https://i.imgur.com/KdfE4bL.jpg" }, // 財閥工廠
            D: { name: "🛠️ 底層勞工", funds: 40, stability: 75, tech: 40, img: "https://i.imgur.com/KdfE65L.jpg" }  // 鐵鎬拳頭
        };

        // 解析網址參數
        const urlParams = new URLSearchParams(window.location.search);
        const currentMode = urlParams.get('mode') || 'team'; // host 或 team
        const currentTeam = urlParams.get('team') || 'B';    // 預設 B 隊

        // 初始化背景粒子特效
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    r: Math.random() * 2, speed: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f0ff';
            if(currentMode === 'team') ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--color') || '#00f0ff';
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas(); drawParticles();

        // 渲染主畫面
        const hudMain = document.getElementById('hudMain');
        
        if (currentMode === 'host') {
            // 【主畫面模式：主持人中央大螢幕控制台】
            document.body.className = ""; // 移除單一隊伍色彩
            renderHostLayout();
        } else {
            // 【主畫面模式：學弟妹 HUD 手機平板端】
            document.body.className = `theme-${currentTeam}`;
            renderTeamLayout();
        }

        // --- 渲染小隊 HUD 畫面 ---
        function renderTeamLayout() {
            const team = globalData[currentTeam];
            hudMain.className = "hud-container team-layout";
            hudMain.innerHTML = `
                <!-- 左側三大數據能量條 -->
                <div class="status-bars">
                    <div class="bar-container">
                        <div class="bar-label"><span>💰 FUNDS（金錢）</span><span id="val-funds">${team.funds}%</span></div>
                        <div class="bar-outer"><div id="bar-funds" class="bar-inner" style="width: ${team.funds}%; color:#00f0ff"></div><div class="bar-grid"></div></div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-label"><span>❤️ STABILITY（生命值）</span><span id="val-stability">${team.stability}%</span></div>
                        <div class="bar-outer"><div id="bar-stability" class="bar-inner" style="width: ${team.stability}%; color:#ff3333"></div><div class="bar-grid"></div></div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-label"><span>⚡ CORE TECH（科技點）</span><span id="val-tech">${team.tech}%</span></div>
                        <div class="bar-outer"><div id="bar-tech" class="bar-inner" style="width: ${team.tech}%; color:#00ffcc"></div><div class="bar-grid"></div></div>
                    </div>
                </div>

                <!-- 中央動態雷達與古典去背徽章 -->
                <div class="center-radar">
                    <img class="badge-img" src="${team.img}" alt="陣營徽章">
                    <svg class="radar-svg" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" />
                        <circle cx="100" cy="100" r="70" fill="none" stroke="currentColor" stroke-width="0.5" />
                        <circle cx="100" cy="100" r="50" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="10 5" />
                        <line x1="100" y1="5" x2="100" y2="195" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.3" />
                        <line x1="5" y1="100" x2="195" y2="100" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.3" />
                    </svg>
                </div>

                <!-- 右上 MISSION 抉擇指令彈出區塊 -->
                <div class="mission-panel" id="missionPanel">
                    <div class="mission-title">📡 SYSTEM STATUS</div>
                    <div class="mission-text" id="missionText">天網系統安全連線中。等待中央控制台分發核心決策代碼...</div>
                    <div id="optionContainer"></div>
                </div>

                <!-- 右下 戰術裝飾面板 -->
                <div class="decor-panel">
                    <div>
                        <div>[ SECURITY LEVEL: MAXIMUM ]</div>
                        <div>[ TARGET SECTOR: CORE-ALPHA ]</div>
                    </div>
                    <div style="text-align: right; font-weight: bold; color: #ff7300;">QUANTUM LINK ONLINE</div>
                </div>
            `;
        }

        // --- 渲染主持人大螢幕控制台 ---
        function renderHostLayout() {
            hudMain.className = "hud-container host-layout";
            hudMain.innerHTML = `
                <div class="host-header">臨界連鎖：中央主控台控制中心</div>
                <div class="host-grid">
                    <div class="control-box">
                        <h3>第一步：指定隨機對決結果</h3>
                        <label>🏆 本輪對決贏家（先選）：</label>
                        <select id="winnerSelect">
                            <option value="A">A隊 - 政府高層</option>
                            <option value="B">B隊 - 社團科學家</option>
                            <option value="C">C隊 - 工廠資方</option>
                            <option value="D">D隊 - 底層勞工</option>
                        </select>
                        <label>💀 本輪對決輸家（後選）：</label>
                        <select id="loserSelect">
                            <option value="D">D隊 - 底層勞工</option>
                            <option value="A">A隊 - 政府高層</option>
                            <option value="B">B隊 - 社團科學家</option>
                            <option value="C">C隊 - 工廠資方</option>
                        </select>
                        <button class="host-btn" onclick="triggerHostMission()">📢 發送核心問題至大螢幕與隊員端</button>
                    </div>
                    <div class="control-box" id="hostLogBox">
                        <h3>目前即時事件紀錄</h3>
                        <div style="font-size:12px; color:rgba(0,240,255,0.7); line-height:1.6;" id="hostLogs">
                            [SYSTEM] 系統初始化完成，等待對決判定。
                        </div>
                    </div>
                </div>
            `;
        }

        // 主持人觸發事件模擬測試（點選後，如果是隊員端網頁可以模擬遭受盲炸或跳出選擇題）
        function triggerHostMission() {
            const win = document.getElementById('winnerSelect').value;
            const lose = document.getElementById('loserSelect').value;
            const logBox = document.getElementById('hostLogs');
            logBox.innerHTML += `<br>🚨 [連鎖觸發] 判定 ${win} 隊勝出，已將因果選擇題派發至各隊終端。`;
            
            alert(`已將因果狀態機派發！\n（學弟妹手機端如果是對應隊伍，每幾秒Fetch後就會動態刷出對應的圖片雷達、扣分震動與右上角選項按鈕！）`);
        }

        // --- 模擬觸發扣分時的「螢幕震動與閃紅光」高燃特效 ---
        // 可以在後台 Fetch 偵測到生命或金錢下降時執行這個 Function
        function triggerDamageEffect() {
            const container = document.getElementById('hudMain');
            container.classList.add('shake', 'glitch-flash');
            setTimeout(() => { container.classList.remove('glitch-flash'); }, 150);
            setTimeout(() => { container.classList.remove('shake'); }, 400);
        }
    </script>
</body>
</html>
