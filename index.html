<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL MATRIX HUD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace, "System-UI", sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #020608; color: #00f0ff; overflow: hidden; position: relative; }
        
        /* 數碼背景網格與科技氛圍 */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(2,6,8,0.9) 100%); z-index: 2; pointer-events: none;
        }

        /* 核心網格佈局 - 放大並微調比例 */
        .hud-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95vw; height: 95vw; max-width: 850px; max-height: 850px; z-index: 10;
            background: rgba(4, 10, 15, 0.85);
            border: 2px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), inset 0 0 30px rgba(0, 240, 255, 0.05);
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.4fr;
            grid-template-rows: 0.6fr 2fr 0.8fr;
            padding: 25px; gap: 20px;
        }

        /* 裝飾性不對稱科技切角線 */
        .hud-border-svg {
            position: absolute; top: -2px; left: -2px; width: calc(100% + 4px); height: calc(100% + 4px);
            pointer-events: none; stroke: currentColor; fill: none; stroke-width: 2; opacity: 0.8;
        }

        .top-left-panel { grid-column: 1; grid-row: 1; display: flex; align-items: center; justify-content: flex-start; }
        /* 陣營名稱大字體化 */
        .team-title { font-size: 20px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px currentColor; }

        /* 左中：能量矩陣條 (改粗、字體加重) */
        .mid-left-panel { grid-column: 1; grid-row: 2; display: flex; gap: 20px; align-items: center; justify-content: center; }
        .vertical-bar-container { display: flex; flex-direction: column; align-items: center; gap: 10px; height: 90%; width: 35px; }
        .v-bar-label { font-size: 16px; font-weight: 900; text-shadow: 0 0 8px currentColor; }
        .v-bar-outer { width: 100%; height: 100%; border: 2px solid rgba(0, 240, 255, 0.4); padding: 3px; background: rgba(0,0,0,0.6); position: relative; }
        .v-bar-inner { width: 100%; background: currentColor; position: absolute; bottom: 3px; left: 3px; width: calc(100% - 6px); transition: height 0.6s cubic-bezier(0.1, 0.8, 0.3, 1); filter: drop-shadow(0 0 6px currentColor); }
        .v-bar-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, transparent 70%, #020608 70%); background-size: 100% 14px; }

        /* 左下：雷達坐標矩陣 */
        .bottom-left-panel { grid-column: 1; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.3); position: relative; }

        /* 中央：完全捨棄圖片，改成精細的純 SVG 能量核心旋轉雷達 */
        .center-core { grid-column: 2; grid-row: 1 / span 3; display: flex; justify-content: center; align-items: center; position: relative; }
        .radar-group { width: 95%; height: 95%; }
        .radar-circle { fill: none; stroke: currentColor; stroke-width: 1.5; transform-origin: center; }
        .radar-rotate-fast { animation: rotateRadar 12s linear infinite; }
        .radar-rotate-slow { animation: rotateRadar 25s linear reverse infinite; }

        /* 右上：MISSION 區塊字體全部放大加粗 */
        .top-right-panel {
            grid-column: 3; grid-row: 1 / span 2; border: 2px solid rgba(0, 240, 255, 0.3); 
            background: rgba(3, 12, 20, 0.7); padding: 20px; position: relative;
            clip-path: polygon(0 0, 85% 0, 100% 10%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; gap: 12px;
        }
        .mission-header { font-size: 18px; color: #ff7300; text-shadow: 0 0 8px #ff7300; font-weight: 900; border-bottom: 2px dashed rgba(255,115,0,0.4); padding-bottom: 8px; letter-spacing: 1px; }
        .mission-content { font-size: 16px; line-height: 1.6; color: #ffffff; flex-grow: 1; font-weight: bold; text-shadow: 0 0 2px rgba(255,255,255,0.5); }
        
        /* 按鈕視覺重構：大字體、高亮邊框 */
        .hud-btn {
            display: block; width: 100%; padding: 12px 15px; background: rgba(0, 240, 255, 0.1);
            border: 2px solid currentColor; color: currentColor; text-align: center; cursor: pointer; font-size: 15px; font-weight: 900;
            letter-spacing: 1px; transition: all 0.2s; clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%); margin-top: 8px;
        }
        .hud-btn:hover { background: currentColor; color: #020608; box-shadow: 0 0 15px currentColor; }

        /* 右下：數據艙 */
        .bottom-right-panel {
            grid-column: 3; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 15px; display: flex; flex-direction: column; justify-content: center; gap: 8px;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 85% 100%, 0 100%);
        }
        .status-line { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: rgba(0,240,255,0.8); }

        /* 主持人中央主控台 */
        .host-screen {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; z-index: 20;
            background: rgba(3, 8, 12, 0.98); border: 2px solid #00f0ff; padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .host-title { font-size: 28px; text-align: center; border-bottom: 2px solid #00f0ff; padding-bottom: 10px; color: #ff7300; font-weight: 900; }
        .host-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; flex-grow: 1; }
        .host-panel-box { border: 2px dashed rgba(0,240,255,0.4); padding: 20px; background: rgba(0,0,0,0.5); }
        select, button { background: #07141e; color: #00f0ff; border: 2px solid #00f0ff; padding: 15px; width: 100%; margin-top: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button { background: #ff7300; color: white; border: none; }

        /* 陣營色彩定義 */
        .theme-A { --color: #ffb700; } 
        .theme-B { --color: #00f0ff; } 
        .theme-C { --color: #d400ff; } 
        .theme-D { --color: #ff3333; } 
        
        .theme-A, .theme-B, .theme-C, .theme-D { color: var(--color); border-color: var(--color); }
        .theme-A .hud-screen, .theme-A .v-bar-outer { border-color: rgba(255,183,0,0.5); }
        .theme-B .hud-screen, .theme-B .v-bar-outer { border-color: rgba(0,240,255,0.5); }
        .theme-C .hud-screen, .theme-C .v-bar-outer { border-color: rgba(212,0,255,0.5); }
        .theme-D .hud-screen, .theme-D .v-bar-outer { border-color: rgba(255,51,51,0.5); }

        @keyframes rotateRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="theme-B">

    <div id="mainView"></div>

    <script>
        // 純數據庫，不包含任何外部圖片網址
        const globalData = {
            A: { name: "🏛️ 政府高層 SYSTEM", funds: 85, stability: 95, tech: 45 }, 
            B: { name: "🧪 社團科學家 SYSTEM", funds: 60, stability: 70, tech: 90 }, 
            C: { name: "🏢 工廠資方 SYSTEM", funds: 95, stability: 55, tech: 65 }, 
            D: { name: "🛠️ 底層勞工 SYSTEM", funds: 45, stability: 80, tech: 35 }  
        };

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'team';
        const teamKey = urlParams.get('team') || 'B';
        const mainView = document.getElementById('mainView');

        if (mode === 'host') {
            document.body.className = "";
            renderHostView();
        } else {
            document.body.className = `theme-${teamKey}`;
            renderTeamView();
        }

        function renderTeamView() {
            const data = globalData[teamKey];
            mainView.innerHTML = `
                <div class="hud-screen" id="hudScreen">
                    <svg class="hud-border-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M 0,8 L 8,0 L 92,0 L 100,8 L 100,92 L 92,100 L 8,100 L 0,92 Z" />
                        <path d="M 0,15 L 0,30 M 100,15 L 100,30 M 30,0 L 45,0 M 55,0 L 70,0" stroke-width="1.5"/>
                    </svg>

                    <div class="top-left-panel">
                        <div class="team-title">${data.name}</div>
                    </div>

                    <div class="mid-left-panel">
                        <div class="vertical-bar-container" style="color: currentColor;">
                            <span class="v-bar-label">FD</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.funds}%;"></div><div class="v-bar-grid"></div></div>
                        </div>
                        <div class="vertical-bar-container" style="color: #ff7300;">
                            <span class="v-bar-label">ST</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.stability}%;"></div><div class="v-bar-grid"></div></div>
                        </div>
                        <div class="vertical-bar-container" style="color: #00ffaa;">
                            <span class="v-bar-label">TC</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.tech}%;"></div><div class="v-bar-grid"></div></div>
                        </div>
                    </div>

                    <div class="bottom-left-panel">
                        <svg width="100%" height="100%" style="stroke:currentColor; fill:none; opacity:0.4; stroke-width:0.5;">
                            <line x1="0" y1="50" x2="100" y2="50" stroke-dasharray="2 2"/>
                            <line x1="50" y1="0" x2="50" y2="100" stroke-dasharray="2 2"/>
                            <circle cx="50" cy="50" r="30" stroke-dasharray="4 4"/>
                        </svg>
                    </div>

                    <!-- 中央改為純數碼高科技核心（類似反應爐的精細網格） -->
                    <div class="center-core">
                        <svg class="radar-group" viewBox="0 0 200 200">
                            <!-- 外層旋轉刻度 -->
                            <circle class="radar-circle radar-rotate-fast" cx="100" cy="100" r="85" stroke-dasharray="5 10 30 5"/>
                            <circle class="radar-circle radar-rotate-slow" cx="100" cy="100" r="75" stroke-dasharray="40 10 10 10"/>
                            <!-- 中層多角形核心 -->
                            <polygon class="radar-circle radar-rotate-fast" points="100,45 148,72 148,128 100,155 52,128 52,72" stroke-dasharray="4 4"/>
                            <!-- 內層核心幾何圖形 -->
                            <circle class="radar-circle" cx="100" cy="100" r="35" stroke-width="2"/>
                            <circle class="radar-circle radar-rotate-slow" cx="100" cy="100" r="25" stroke-dasharray="6 6"/>
                            <circle class="radar-circle" cx="100" cy="100" r="8" fill="currentColor" opacity="0.7"/>
                            <!-- 十字定位線 -->
                            <path d="M 100,0 L 100,200 M 0,100 L 200,100" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.3"/>
                        </svg>
                    </div>

                    <div class="top-right-panel">
                        <div class="mission-header">🛰️ SYSTEM STATUS</div>
                        <div class="mission-content">QUANTUM NET ACTIVE.<br><br>系統連線成功。<br>正在等待中央控制台下達大抉擇指令...</div>
                        <div>
                            <button class="hud-btn">▶ 執行系統測試</button>
                            <button class="hud-btn">▶ 定位同步回傳</button>
                        </div>
                    </div>

                    <div class="bottom-right-panel">
                        <div class="status-line"><span>MATRIX:</span><span>ONLINE</span></div>
                        <div class="status-line"><span>SIGNAL:</span><span>SECURE</span></div>
                    </div>
                </div>
            `;
        }

        function renderHostView() {
            mainView.innerHTML = `
                <div class="host-screen">
                    <div class="host-title">🌌 臨界連鎖：量子控制台</div>
                    <div class="host-columns">
                        <div class="host-panel-box">
                            <h3>🤖 第一步：對決勝負宣判</h3>
                            <select id="winSelect">
                                <option value="A">A 隊 - 政府高層</option>
                                <option value="B">B 隊 - 社團科學家</option>
                                <option value="C">C 隊 - 工廠資方</option>
                                <option value="D">D 隊 - 底層勞工</option>
                            </select>
                            <button onclick="alert('指令已同步！')">📡 啟動全場連鎖大抉擇</button>
                        </div>
                        <div class="host-panel-box">
                            <h3>📊 戰術通訊日誌</h3>
                            <div style="font-size:16px; color:rgba(0,240,255,0.7);">[天網核心] 數據流初始化成功，等待對決信號。</div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
