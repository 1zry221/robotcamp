<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL MATRIX SYSTEM v2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace, "System-UI", sans-serif; }
        body, html { width: 100%; min-height: 100%; background-color: #020608; color: #00f0ff; position: relative; }
        
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(2,6,8,0.9) 100%); z-index: 2; pointer-events: none;
        }

        .main-container {
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; position: relative; z-index: 10;
        }

        .hud-screen {
            position: relative; width: 95vw; max-width: 850px; min-height: 650px;
            background: rgba(4, 10, 15, 0.9); border: 2px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), inset 0 0 30px rgba(0, 240, 255, 0.05);
            display: grid; grid-template-columns: 1.3fr 1.6fr 1.4fr; grid-template-rows: auto 1fr auto; padding: 25px; gap: 20px;
        }
        .hud-border-svg { position: absolute; top: -2px; left: -2px; width: calc(100% + 4px); height: calc(100% + 4px); pointer-events: none; stroke: currentColor; fill: none; stroke-width: 2; opacity: 0.8; }
        
        .top-left-panel { grid-column: 1 / span 2; grid-row: 1; display: flex; align-items: center; justify-content: space-between; }
        .team-title { font-size: 20px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 10px currentColor; line-height: 1.3; }

        .mid-left-panel { display: flex; flex-direction: column; justify-content: space-around; align-items: center; grid-column: 1; grid-row: 2; min-height: 270px; padding: 15px 5px; border: 1px solid rgba(0, 240, 255, 0.15); background: rgba(0,0,0,0.2); gap: 10px; }
        .dial-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 6px; }
        .dial-svg-wrapper { position: relative; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
        .dial-svg-wrapper svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .dial-bg { fill: none; stroke: rgba(0, 240, 255, 0.08); stroke-width: 5; }
        .dial-fill { fill: none; stroke-width: 5; stroke-dasharray: 157; transition: stroke-dashoffset 0.5s cubic-bezier(0.1, 0.8, 0.3, 1); stroke-linecap: round; }
        .dial-text { position: absolute; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace; color: #ffffff; text-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .v-bar-label { font-size: 13px; font-weight: 900; text-shadow: 0 0 8px currentColor; text-align: center; margin-top: 2px; }
        
        .bottom-left-panel { grid-column: 1; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.3); position: relative; min-height: 60px; }

        .center-core { grid-column: 2; grid-row: 2; display: flex; justify-content: center; align-items: center; position: relative; }
        .radar-group { width: 90%; height: 90%; max-width: 220px; }
        .radar-circle { fill: none; stroke: currentColor; stroke-width: 1.5; transform-origin: center; }
        .radar-rotate-fast { animation: rotateRadar 12s linear infinite; }
        .radar-rotate-slow { animation: rotateRadar 25s linear reverse infinite; }

        .top-right-panel {
            grid-column: 3; grid-row: 1 / span 2; border: 2px solid rgba(0, 240, 255, 0.3); 
            background: rgba(3, 12, 20, 0.7); padding: 18px; position: relative;
            clip-path: polygon(0 0, 85% 0, 100% 10%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; gap: 12px; justify-content: flex-start;
        }
        .mission-content { font-size: 13px; line-height: 1.5; color: #ffffff; font-weight: bold; }
        
        .action-box { display: flex; flex-direction: column; margin-top: auto; }
        .hud-btn {
            display: block; width: 100%; padding: 10px 8px; background: rgba(0, 240, 255, 0.1);
            border: 2px solid currentColor; color: currentColor; text-align: center; cursor: pointer; font-size: 12px; font-weight: 900;
            transition: all 0.2s; clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%); margin-top: 8px;
            line-height: 1.3;
        }
        .hud-btn:hover { background: currentColor; color: #020608; box-shadow: 0 0 15px currentColor; }
        .hud-btn:disabled, .panel-sync-btn:disabled, .primary-btn:disabled, .host-select:disabled, .tab-btn:disabled {
            opacity: 0.4 !important; cursor: not-allowed !important; background: rgba(50,50,50,0.5) !important; color: #888 !important; box-shadow: none !important;
        }

        .bottom-right-panel { 
            grid-column: 3; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2); padding: 10px; 
            display: flex; flex-direction: column; justify-content: space-between; gap: 6px; 
            clip-path: polygon(0 0, 100% 0, 100% 75%, 85% 100%, 0 100%); background: rgba(0,0,0,0.2);
        }
        .status-line { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: rgba(0,240,255,0.6); }
        
        .panel-sync-btn {
            width: 100%; background: #00ffaa; color: #020608; border: none;
            padding: 8px 0; font-size: 13px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.3); transition: all 0.15s ease;
            text-align: center; margin-top: 2px;
        }
        .panel-sync-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #00ffaa; }

        .net-status-badge { font-size: 12px; padding: 4px 8px; background: rgba(0,0,0,0.5); border: 1px solid #00ffaa; color: #00ffaa; font-weight: bold; }
        .net-status-badge.fail { border-color: #ff3333; color: #ff3333; animation: flash 1s infinite; }

        @media (max-width: 600px) {
            .main-container { padding: 10px; align-items: flex-start; }
            .hud-screen { display: flex; flex-direction: column; width: 100%; min-height: auto; height: auto; padding: 15px; gap: 15px; }
            .top-left-panel { order: 1; }
            .mid-left-panel { order: 3; min-height: auto; padding: 12px; flex-direction: row; gap: 15px; } 
            .center-core { order: 2; padding: 10px 0; } 
            .radar-group { max-width: 120px; }
            .top-right-panel { order: 4; clip-path: none; min-height: auto; } 
            .bottom-left-panel { display: none; } 
            .bottom-right-panel { order: 5; clip-path: none; margin-top: 5px; } 
            .panel-sync-btn { padding: 12px 0; font-size: 15px; } 
        }

        /* Host Screen Dashboard */
        .host-screen {
            position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; z-index: 100;
            background: #040d14; padding: 25px; color: #00f0ff; padding-bottom: 100px;
        }
        .host-top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00f0ff; padding-bottom: 10px; margin-bottom: 20px; }
        .host-header { font-size: 26px; font-weight: 900; color: #ff7300; text-shadow: 0 0 10px #ff7300; }
        .sync-indicator { font-size: 13px; color: #00ffaa; margin-left: 15px; font-weight: normal; }
        .reset-btn { background: #ff3333; color: #fff; border: none; padding: 8px 16px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .host-grid { display: grid; grid-template-columns: 1.2fr 1.1fr; gap: 20px; }
        @media (max-width: 900px) { .host-grid { grid-template-columns: 1fr; } }
        .control-panel-box { border: 2px solid rgba(0,240,255,0.3); background: rgba(0,0,0,0.4); padding: 20px; }
        .panel-title { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 15px; border-left: 4px solid #ff7300; padding-left: 8px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .host-select { background: #07141e; color: #fff; border: 1px solid #00f0ff; padding: 10px; font-size: 16px; font-weight: bold; width: 100%; }
        
        .action-bar { border-top: 1px dashed rgba(0,240,255,0.3); padding-top: 15px; margin-top: 15px; }
        .primary-btn { width: 100%; padding: 14px; background: #ff7300; color: #fff; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .log-box { background: #020609; border: 1px solid rgba(0,240,255,0.2); padding: 15px; height: 220px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
        
        .score-board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        @media (max-width: 500px) { .score-board { grid-template-columns: 1fr; } }
        .score-card { background: rgba(7, 20, 30, 0.8); border: 1px solid rgba(0,240,255,0.3); padding: 10px; }
        .score-card-title { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .score-card-vals { font-size: 12px; color: #fff; display: flex; justify-content: space-between; }

        .theme-A { --color: #ffb700; } .theme-B { --color: #00f0ff; } .theme-C { --color: #d400ff; } .theme-D { --color: #ff3333; } 
        .theme-A, .theme-B, .theme-C, .theme-D { color: var(--color); border-color: var(--color); }
        .theme-A .hud-screen { border-color: rgba(255,183,0,0.5); }
        .theme-B .hud-screen { border-color: rgba(0,240,255,0.5); }
        .theme-C .hud-screen { border-color: rgba(212,0,255,0.5); }
        .theme-D .hud-screen { border-color: rgba(255,51,51,0.5); }

        @keyframes rotateRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

                        C: {
                            A: { label: "⚡ 方案甲：利用實體生產線與原料壟斷大幅調高價格", effect: (state) => { state.teams.C.funds = clamp(state.teams.C.funds + 20); state.teams.D.stability = clamp(state.teams.D.stability - 5); state.teams.A.funds = clamp(state.teams.A.funds - 10); } },
                            B: { label: "⚡ 方案乙：砸重金資助面臨官方調查的科學家", effect: (state) => { state.teams.C.funds = clamp(state.teams.C.funds - 15); state.teams.C.tech = clamp(state.teams.C.tech + 25); state.teams.B.funds = clamp(state.teams.B.funds + 15); } }
                        },
                        D: {
                            A: { label: "⚡ 方案甲：破解防禦從財閥備用電纜中物理抽血", effect: (state) => { state.teams.D.stability = clamp(state.teams.D.stability + 10); state.teams.D.tech = clamp(state.teams.D.tech + 10); state.teams.C.tech = clamp(state.teams.C.tech - 15); } },
                            B: { label: "⚡ 方案乙：把代碼改造成非法電力外掛在黑市拋售", effect: (state) => { state.teams.D.funds = clamp(state.teams.D.funds + 25); state.teams.D.stability = clamp(state.teams.D.stability - 10); state.teams.A.tech = clamp(state.teams.A.tech - 20); } }
                        }
                    }
                }
            },
            2: {
                "A_C_A": { text: "政府的軍隊接管了街頭，資本的摩天大樓則獲得特許電力閃爍著冷酷的光芒，政商鐵三角正式成形。在此高壓下，科學家的技術被全面封禁，而最底層的勞工則面臨被無限壓榨的生存絕境。", choices: { A: { label: "⚡ 方案甲：交出實驗室最高控制權與核心代碼", effect: (state) => { state.teams.B.stability += 15; state.teams.B.funds -= 10; state.teams.A.tech += 15; state.teams.C.tech += 15; } }, B: { label: "⚡ 方案乙：將數位病毒植入電網並暗中聯絡勞工", effect: (state) => { state.teams.B.stability += 15; state.teams.A.funds -= 20; state.teams.A.tech -= 20; state.teams.C.funds -= 20; state.teams.D.stability += 10; } } } },
                "A_C_B": { text: "政府的戒嚴遭遇了資本的反抗。同時，資本家用大筆資金暗中扶植被查封的科學家。此時，全城的焦點都落在科學家身上，而最底層的勞工則在兩大集團的夾縫中等待局勢洗牌。", choices: { A: { label: "⚡ 方案甲：履行秘密協議，獨家供技給資本家", effect: (state) => { state.teams.B.tech += 10; state.teams.B.funds += 15; state.teams.A.tech -= 15; state.teams.C.tech += 15; } }, B: { label: "⚡ 方案乙：拒做私有工具，將代碼開源廣播市民", effect: (state) => { state.teams.B.tech -= 10; state.teams.B.stability += 15; state.teams.A.funds -= 15; state.teams.D.tech += 15; state.teams.D.stability += 20; } } } },
                "A_D_A": { text: "政府的軍事戒嚴大獲成功，在勞工的順聽配合下，統治威權達到頂峰。此時，政府調轉槍頭，開始全面清算獨立的科研機構，被切斷實驗室能源的科學家即將迎來他們的命運抉擇。", choices: { A: { label: "⚡ 方案甲：敞開實驗室大門，併入國家科研體制", effect: (state) => { state.teams.B.funds -= 10; state.teams.B.stability += 15; state.teams.A.tech += 20; } }, B: { label: "⚡ 方案乙：拒絕成為獨裁幫兇，攜儀器流亡黑區", effect: (state) => { state.teams.B.funds -= 15; state.teams.B.tech += 10; state.teams.A.tech -= 15; } } } },
                "A_D_B": { text: "政府雖然宣稱掌控全城，但廢棄街區的夜空中，依然閃爍著勞工私接黑市電網的零星燈火。此時，政府將目標轉向獨立實驗室，而夾在中間的科學家，必須在招安與流亡之間做出抉擇。", choices: { A: { label: "⚡ 方案甲：研發反偷電偵測演算法精準自保", effect: (state) => { state.teams.B.funds -= 10; state.teams.B.stability += 15; state.teams.A.tech += 20; state.teams.D.tech -= 10; } }, B: { label: "⚡ 方案乙：攜加密代碼與圖紙，逃入勞工地下聚落", effect: (state) => { state.teams.B.funds -= 15; state.teams.B.tech += 10; state.teams.A.tech -= 15; state.teams.D.tech += 15; } } } },
                "B_C_A": { text: "政商兩大巨頭在沒有戒嚴的表象下，暗中達成利益同盟，這讓被抄家查封的科學家陷入破產邊緣，而最底層的勞工則迎來了更隱蔽、卻更殘酷的經濟壓榨。", choices: { A: { label: "⚡ 方案甲：專利技術低價賣財閥，換資金庇護", effect: (state) => { state.teams.B.stability += 10; state.teams.B.funds += 20; state.teams.C.tech += 20; } }, B: { label: "⚡ 方案乙：查封前將自動化與防衛代碼開源廣播", effect: (state) => { state.teams.B.stability += 15; state.teams.B.tech -= 15; state.teams.C.funds -= 20; state.teams.D.stability += 10; state.teams.D.tech += 10; } } } },
                "B_C_B": { text: "政府的行政清算遭遇了資本的全面金錢反制。財閥用大筆資金在地下秘密扶植被查封的科學家。而夾在政府與財閥兩大巨頭之間的勞工，則在觀望這場體制外的神仙打架。", choices: { A: { label: "⚡ 方案甲：拿財閥錢並交付技術，建地下帝國", effect: (state) => { state.teams.B.funds += 20; state.teams.B.tech += 10; state.teams.C.tech += 20; state.teams.A.funds -= 20; } }, B: { label: "⚡ 方案乙：完成技術突破但拒成私財，開源廣播", effect: (state) => { state.teams.B.stability += 15; state.teams.B.tech -= 5; state.teams.D.tech += 10; state.teams.D.stability += 10; state.teams.A.funds -= 15; } } } },
                "B_D_A": { text: "政府的鋼鐵重錘極其精準地砸碎了全城的獨立實驗室。然而，本該與科學家守望相助的勞工，此時卻瘋狂收購外流的科研禁品，點燃了自己的科技火種，但科學家卻被逼上了絕路。", choices: { A: { label: "⚡ 方案甲：攜技術投靠唯一的避難所摩天大樓", effect: (state) => { state.teams.B.funds += 15; state.teams.B.tech -= 10; state.teams.C.tech += 15; } }, B: { label: "⚡ 方案乙：最後時刻玉石俱焚，開源生存密碼", effect: (state) => { state.teams.B.stability -= 5; state.teams.B.tech += 10; state.teams.D.stability += 5; state.teams.D.tech += 10; state.teams.A.tech -= 20; } } } },
                "B_D_B": { text: "政府的緝捕隊正在科研區瘋狂破門。而隔壁街區的勞工工廠依然馬力全開，底層市民選擇當個聽話的齒輪。沒有民間的掩護，也沒有黑市的接應，科學家的象牙塔被徹底孤立。", choices: { A: { label: "⚡ 方案甲：出賣技術主權，秘密投靠資本換庇護", effect: (state) => { state.teams.B.funds += 20; state.teams.B.stability += 5; state.teams.C.tech += 25; } }, B: { label: "⚡ 方案乙：最後時刻數據自爆，癱瘓基建設施", effect: (state) => { state.teams.B.tech += 10; state.teams.B.stability -= 10; state.teams.A.tech -= 25; state.teams.D.tech -= 10; state.teams.C.tech -= 5; } } } },

                "Sci_A_C_A": { text: "半數區域依舊一片死寂，資本不僅沒有釋放電力救災，反而將科學家拼死保全的數據套上天價專利。政府的指揮系統因為斷電陷入混亂，而勞工正面臨生命值被瘋狂抽血的絕望邊緣。", choices: { A: { label: "⚡ 方案甲：強行攻破資本數據中心，收歸國有", effect: (state) => { state.teams.A.tech += 20; state.teams.C.funds -= 10; state.teams.C.tech -= 10; } }, B: { label: "⚡ 方案乙：強行勞工資產充公，向資本購買電力", effect: (state) => { state.teams.A.stability += 10; state.teams.D.funds -= 20; state.teams.C.funds += 10; } } } },
                "Sci_A_C_B": { text: "城市的平民窟與公家機關依舊一片漆黑，唯有資本財閥的總部大樓在夜空中閃爍著防衛系統的冷光。得到科學家的電力與 AI 數據支持後，資本家拒絕向任何人分享能源。", choices: { A: { label: "⚡ 方案甲：切斷財閥物資，強行凍結其金融網絡", effect: (state) => { state.teams.A.funds += 10; state.teams.A.tech += 10; state.teams.C.funds -= 20; } }, B: { label: "⚡ 方案乙：發布徵調令，強行要求勞工無酬搶修", effect: (state) => { state.teams.A.stability += 15; state.teams.A.funds -= 10; state.teams.D.funds -= 15; state.teams.D.stability -= 10; } } } },
                "Sci_A_D_A": { text: "城市的上空被滾滾黑煙與刺鼻的廢氣籠罩，勞工雖然靠著燃煤勉強恢復了體溫與生命力，但大範圍的低階燃燒讓整座城市的公共環境急劇惡化。", choices: { A: { label: "⚡ 方案甲：派遣防暴警察強行取締貧民窟燃煤點", effect: (state) => { state.teams.A.stability += 10; state.teams.A.tech += 5; state.teams.D.stability -= 20; } }, B: { label: "⚡ 方案乙：徵調民間工作坊逼迫無酬搶修公共線路", effect: (state) => { state.teams.A.stability += 15; state.teams.A.funds -= 10; state.teams.D.funds -= 10; state.teams.D.stability -= 10; } } } },
                "Sci_A_D_B": { text: "由於勞工聯合停工，逼得資本財閥不得不釋出部分資金與物資來安撫勞工。然而，這場勞資拉鋸戰，讓整座城市的公共基建徹底處於無人修復的癱瘓狀態。", choices: { A: { label: "⚡ 方案甲：武力戒嚴強行驅散罷工沒收私人物資", effect: (state) => { state.teams.A.stability += 20; state.teams.D.stability -= 15; } }, B: { label: "⚡ 方案乙：將罷工勞工成批編入國家工程隊搶修", effect: (state) => { state.teams.A.stability += 15; state.teams.D.funds -= 10; state.teams.D.stability -= 10; } } } },
                "Sci_B_C_A": { text: "勞工的螢幕上雖然閃爍著科學家無償提供的應變代碼，隨即卻發現實體零件價格一夜暴漲了十倍。手握供應鏈的資本財閥在大發災難財的同時，也實質上干擾了全城電網的自主修復。", choices: { A: { label: "⚡ 方案甲：實施嚴格的價格上限與配給制", effect: (state) => { state.teams.A.tech += 20; state.teams.C.funds -= 25; } }, B: { label: "⚡ 方案乙：發布徵調令要求勞工無酬加班搶修", effect: (state) => { state.teams.A.stability += 15; state.teams.A.funds -= 10; state.teams.D.funds -= 15; state.teams.D.stability -= 10; } } } },
                "Sci_B_C_B": { text: "雖然中央電網依然癱瘓，但資本的資金注入讓科學家的後續研究得以繼續。然而，這種民間與商界的「技術跨界結盟」，讓手握行政權卻在科技上被架空的政府感到強烈的邊緣化危機。", choices: { A: { label: "⚡ 方案甲：宣布新能源技術強制納入官方審查", effect: (state) => { state.teams.A.tech += 20; state.teams.C.funds -= 25; } }, B: { label: "⚡ 方案乙：強行徵調勞工無酬搶修舊核心電網", effect: (state) => { state.teams.A.stability += 15; state.teams.A.funds -= 10; state.teams.D.funds -= 15; state.teams.D.stability -= 10; } } } },
                "Sci_B_D_A": { text: "勞工靠著「借用」財閥的電力大舉復活，生命力強勢回升。然而，這不僅讓資本的高壓電網出現嚴重電壓不穩，更在城市底層建立起了一套完全不受官方管控的「土法地下電網」。", choices: { A: { label: "⚡ 方案甲：剪斷私接電纜，將土法電網公有化", effect: (state) => { state.teams.A.tech += 5; state.teams.A.stability += 10; state.teams.D.stability -= 15; } }, B: { label: "⚡ 方案乙：將體力恢復的勞工成批押上官方工地", effect: (state) => { state.teams.A.stability += 15; state.teams.A.funds -= 10; state.teams.D.funds -= 15; state.teams.D.stability -= 10; } } } },
                "Sci_B_D_B": { text: "在科學家將技術代碼向全城開源後，勞工將其改造成「非法電力外掛」與「加密通訊晶片」。無數的加密訊號在底層流竄，導致整座城市的治安監控與電力網路陷入徹底失控的混亂。", choices: { A: { label: "⚡ 方案甲：派遣防暴警察砸毀黑市沒收通訊設備", effect: (state) => { state.teams.A.tech += 10; state.teams.D.funds -= 15; } }, B: { label: "⚡ 方案乙：強制抓捕黑客與技術勞工編入工程隊", effect: (state) => { state.teams.A.stability += 15; state.teams.A.funds -= 10; state.teams.D.tech -= 15; state.teams.D.stability -= 10; } } } }
            },
            3: {
                "A_C_A_A": { text: "政府的軍隊、資本的資金與科學家的技術徹底合流，組成堅不可摧的統治鐵三角。在這座燈火通明的極權城市中，沒有任何談判籌碼的勞工，正被逼入毫無退路的命運終點。", choices: { A: { label: "⚡ 方案甲：走回工廠趕工，血汗換取微薄口糧", effect: (state) => { state.teams.D.funds += 15; state.teams.D.stability -= 10; state.teams.A.funds += 10; state.teams.C.funds += 10; } }, B: { label: "⚡ 方案乙：發起全城大罷工，離崗使生產力歸零", effect: (state) => { state.teams.D.stability -= 5; state.teams.A.funds -= 25; state.teams.C.funds -= 25; state.teams.B.funds -= 10; } } } },
                "A_C_A_B": { text: "政府與資本聯手築起鋼鐵般的特權防線，但科學家在暗中釋放了數位病毒，癱瘓了中央電網，並將能源偷偷導向底層。", choices: { A: { label: "⚡ 方案甲：組自衛隊衝入工廠，自行運作分物資", effect: (state) => { state.teams.D.funds += 20; state.teams.D.stability -= 10; state.teams.A.stability -= 15; state.teams.C.funds -= 25; } }, B: { label: "⚡ 方案乙：不正面硬碰硬，建立自給自足黑電社區", effect: (state) => { state.teams.D.stability += 15; state.teams.D.tech += 10; state.teams.A.funds -= 5; state.teams.B.stability += 10; } } } },
                "A_C_B_A": { text: "政府的軍事戒嚴與資本的地下金融持續對峙，而科學家已將核心技術獨家交給資本家，形成了全新的特權階級，而被兩大巨頭夾在中間的勞工，生存空間被進一步壓縮。", choices: { A: { label: "⚡ 方案甲：簽署地下僱傭約，進資本秘密工廠", effect: (state) => { state.teams.D.funds += 15; state.teams.D.stability += 10; state.teams.A.funds -= 10; state.teams.C.funds += 10; } }, B: { label: "⚡ 方案乙：發起全面怠工，拒絕配合任何頂層", effect: (state) => { state.teams.D.stability -= 5; state.teams.A.funds -= 15; state.teams.C.funds -= 20; } } } },
                "A_C_B_B": { text: "政府與資本的頂層對峙陷入僵局，而科學家的開源廣播，讓最底層的勞工瞬間掌握了能源主導權，從任人宰割的燃料，變成了左右城市命運的關鍵棋子。", choices: { A: { label: "⚡ 方案甲：組建貧民窟微電網，實現自給自足", effect: (state) => { state.teams.D.stability += 15; state.teams.D.funds += 15; state.teams.D.tech += 10; state.teams.A.funds -= 10; state.teams.C.funds -= 10; } }, B: { label: "⚡ 方案乙：武器化民用科技，對政府與資本反擊", effect: (state) => { state.teams.D.stability -= 10; state.teams.D.tech += 15; state.teams.A.funds -= 20; state.teams.A.stability -= 15; state.teams.C.funds -= 20; } } } },
                "A_D_A_A": { text: "政府靠著鐵腕戒嚴全面掌控了局勢，勞工選擇順從並交出資源，科學家也帶著核心技術向國家臣服。此時，被完全孤立在體制外的資本財閥，正面臨資產被國家逐步蠶食的生死關頭。", choices: { A: { label: "⚡ 方案甲：工廠股份上繳，換取經濟委員會席次", effect: (state) => { state.teams.C.stability += 15; state.teams.C.tech += 10; state.teams.C.funds -= 25; state.teams.A.funds += 15; } }, B: { label: "⚡ 方案乙：海外秘密網絡發動，將財富強制出境", effect: (state) => { state.teams.C.stability -= 15; state.teams.C.funds += 15; state.teams.A.funds -= 15; state.teams.D.funds += 10; } } } },
                "A_D_A_B": { text: "政府全面掌控了街頭，勞工也選擇順從並交出資源。然而，科學家拒絕向國家臣服。而手中握有龐大資金卻缺乏技術的資本財閥，正站在向體制投降或投資地下反抗勢力的十字路口。", choices: { A: { label: "⚡ 方案甲：充當政府耳目蒐情報，換獨家經營權", effect: (state) => { state.teams.C.stability += 10; state.teams.C.funds += 15; state.teams.A.tech += 15; state.teams.B.stability -= 10; state.teams.B.tech -= 10; } }, B: { label: "⚡ 方案乙：鋌而走險地下輸資，助科研重啟", effect: (state) => { state.teams.C.tech += 20; state.teams.C.funds -= 20; state.teams.A.stability -= 10; state.teams.B.funds += 20; state.teams.B.stability += 10; } } } },
                "A_D_B_A": { text: "政府獲得了科學家的技術投誠，開始精準切斷勞工的地下私電。此時，「政、科」聯手將絞索套在了底層脖子上，而在一旁觀戰的資本財閥，迎來了決定局勢走向的最終機會。", choices: { A: { label: "⚡ 方案甲：重金收購國債，換未來電網私有權", effect: (state) => { state.teams.C.stability += 10; state.teams.C.funds -= 20; state.teams.A.funds += 10; state.teams.D.stability -= 15; } }, B: { label: "⚡ 方案乙：建企業庇護所，出資幫勞工升級設備", effect: (state) => { state.teams.C.tech += 10; state.teams.C.funds -= 15; state.teams.A.funds -= 15; state.teams.D.stability += 10; state.teams.D.funds += 10; } } } },
                "A_D_B_B": { text: "政府的鋼鐵戒嚴未能徹底封鎖全城，科學家帶著核心技術遁入地下，與正在黑市偷電的勞工合流。此時，手握全城最多閒置資金的資本財閥，正面臨兩難...", choices: { A: { label: "⚡ 方案甲：出賣地下聚集地給軍隊換大筆賞金", effect: (state) => { state.teams.C.funds += 10; state.teams.A.tech += 10; state.teams.D.stability -= 10; state.teams.B.stability -= 10; } }, B: { label: "⚡ 方案乙：海外秘密帳戶開動，資助民間反抗", effect: (state) => { state.teams.C.tech += 20; state.teams.C.funds -= 10; state.teams.A.funds -= 25; state.teams.A.stability -= 10; state.teams.D.funds += 10; state.teams.B.funds += 10; } } } },
                "B_C_A_A": { text: "「政、商、科」三方在體制內完成了資源與技術的合流，而這場繁榮的代價，全由毫無技術、被徹底孤立的勞工在工廠底層用血汗獨自承擔。", choices: { A: { label: "⚡ 方案甲：在設計監控系統下瘋狂加班換糧", effect: (state) => { state.teams.D.stability -= 20; state.teams.D.funds += 10; state.teams.A.funds += 10; state.teams.C.funds += 20; } }, B: { label: "⚡ 方案乙：集體罷工並砸積蓄走私醫療糧食物資", effect: (state) => { state.teams.D.stability += 15; state.teams.D.funds -= 15; state.teams.A.funds -= 10; state.teams.C.funds -= 10; } } } },
                "B_C_A_B": { text: "政府與資本表面上達成了政商利益同盟，但科學家在被徹底查封前，將系統與自動化升級代碼無償廣播給了民間，讓原本遭到資本家瘋狂壓榨的勞工生命力大補血。", choices: { A: { label: "⚡ 方案甲：篡改工廠核心機器，扣留利潤分發", effect: (state) => { state.teams.D.stability -= 5; state.teams.D.funds += 20; state.teams.A.funds -= 15; state.teams.C.funds -= 25; } }, B: { label: "⚡ 方案乙：發起全面科技不合作，屏蔽全城信號", effect: (state) => { state.teams.D.stability += 10; state.teams.D.tech += 5; state.teams.A.funds -= 20; state.teams.C.funds -= 20; } } } },
                "B_C_B_A": { text: "資本的金援與科學家的黑科技在體制外深度結合，讓政府的行政控制全面失靈。然而，這場科技內鬥，並沒有惠及底層，毫無資源的勞工依舊在夾縫中，等待最後的生存抉擇。", choices: { A: { label: "⚡ 方案甲：進入技術屏蔽秘密工廠，換高科庇護", effect: (state) => { state.teams.D.stability += 10; state.teams.D.funds += 5; state.teams.A.funds -= 10; state.teams.C.funds += 10; } }, B: { label: "⚡ 方案乙：發起全面不合作運動，拒絕所有頂層", effect: (state) => { state.teams.D.stability -= 5; state.teams.A.funds -= 15; state.teams.C.funds -= 15; } } } },
                "B_C_B_B": { text: "政府的行政控制被資本的金權防線擋下，而科學家的開源技術則直接交給了最底層。整座城市都是民用的微型電網，勞工不費吹灰之力就獲得了充足的能源與科技火種。", choices: { A: { label: "⚡ 方案甲：拋棄上層建立去中心化物資共享社區", effect: (state) => { state.teams.D.stability += 10; state.teams.D.funds += 20; state.teams.D.tech += 10; state.teams.A.funds -= 20; state.teams.C.funds -= 20; } }, B: { label: "⚡ 方案乙：聯手科學家對中樞與金庫數位實體清算", effect: (state) => { state.teams.D.stability -= 10; state.teams.D.funds += 25; state.teams.A.funds -= 25; state.teams.C.funds -= 25; } } } },
                "B_D_A_A": { text: "獨立科學界徹底瓦解，但政府並未成功收歸國有。科學家帶著最後的核心專利，遁入了資本的摩天大樓。而此時的勞工雖然淘到了部分科技硬體，卻面臨資本與政府接下來的雙重收割。", choices: { A: { label: "⚡ 方案甲：技術商品化，推出高昂訂閱微型電網", effect: (state) => { state.teams.C.funds += 15; state.teams.A.tech -= 20; state.teams.D.funds -= 5; } }, B: { label: "⚡ 方案乙：保安隊升級私人工隊，街頭與政府駁火", effect: (state) => { state.teams.C.funds -= 20; state.teams.C.stability += 15; state.teams.A.funds -= 15; state.teams.A.stability -= 10; } } } },
                "B_D_A_B": { text: "全城此時充斥著科學家廣播的免費高科技 ，政府試圖壟斷科技的計畫徹底失敗。勞工平白獲得了這套最頂級的技術說明書。這場技術海嘯讓原本在一旁觀戰的資本瞬間被架空。", choices: { A: { label: "⚡ 方案甲：提專利訴訟沒收勞工設備否認合法性", effect: (state) => { state.teams.C.funds -= 10; state.teams.C.tech += 10; state.teams.D.tech -= 10; } }, B: { label: "⚡ 方案乙：砸重金封鎖實體物流使其缺乏製造硬體", effect: (state) => { state.teams.C.funds -= 15; state.teams.A.funds -= 20; state.teams.D.tech -= 10; state.teams.D.stability -= 5; } } } },
                "B_D_B_A": { text: "獨立科學界在孤立無援中瓦解，但政府竹籃打水一場空。科學家們在被逮捕前，帶著最核心的技術專利投靠了資本。而當初選擇冷眼旁觀的勞工，已經徹底失去了科技底牌。", choices: { A: { label: "⚡ 方案甲：技術商品化專利化，推昂貴訂閱電網", effect: (state) => { state.teams.C.funds += 15; state.teams.A.tech -= 20; state.teams.D.funds -= 5; } }, B: { label: "⚡ 方案乙：全面升級武裝工隊，公然與緝捕隊對抗", effect: (state) => { state.teams.C.funds -= 20; state.teams.C.stability += 15; state.teams.A.funds -= 15; state.teams.A.stability -= 10; } } } },
                "B_D_B_B": { text: "科學家在實驗室被攻破的前一刻釋放了病毒，全城電網陷入大癱瘓。政府試圖奪取的技術化為烏有，只想安穩度日的勞工也遭到波及，唯有擁有獨立發電廠的資本，能維持安穩生活。", choices: { A: { label: "⚡ 方案甲：利用獨立能源實施高利貸式血腥救援", effect: (state) => { state.teams.C.funds += 20; state.teams.C.stability += 10; state.teams.A.funds -= 15; state.teams.D.funds -= 20; } }, B: { label: "⚡ 方案乙：扮演救世主重整基建，奪取未來控制權", effect: (state) => { state.teams.C.funds -= 20; state.teams.C.tech += 30; state.teams.A.tech += 5; state.teams.A.funds -= 10; state.teams.D.tech += 5; state.teams.D.funds -= 10; } } } },

                "Sci_A_C_A_A": { text: "政府用最粗暴的武力強行砸開了資本財閥的摩天大樓，將科學家拼死保全的 AI 核心控制權強行沒收、收歸國有。而勞工在經歷了資本家的抽血與政府的槍戰後，被徹底逼入了絕境。", choices: { A: { label: "⚡ 方案甲：用粗糙變壓器從軍事電網啃食電力", effect: (state) => { state.teams.D.stability += 20; state.teams.A.funds -= 10; state.teams.A.tech -= 5; } }, B: { label: "⚡ 方案乙：洗劫實體倉庫，與政府部隊發生巷戰", effect: (state) => { state.teams.D.funds += 15; state.teams.D.stability -= 10; state.teams.A.stability -= 20; state.teams.C.funds -= 15; } } } },
                "Sci_A_C_A_B": { text: "資本靠著科學家提供的 AI 數據賺得盆滿缽滿。而政府為了維持表面上的秩序，派出稅收隊與執法者，強行搜刮勞工僅存的積蓄，向財閥購買高價電力來維持基本公共設施。", choices: { A: { label: "⚡ 方案甲：用粗糙變壓器從軍事電網啃食電力", effect: (state) => { state.teams.D.stability += 20; state.teams.A.funds -= 10; state.teams.A.tech -= 5; } }, B: { label: "⚡ 方案乙：變賣僅存工具代碼給資本並簽勞動合約", effect: (state) => { state.teams.D.funds += 20; state.teams.D.tech -= 10; state.teams.C.tech += 10; } } } },
                "Sci_A_C_B_A": { text: "隨著政府的經濟封鎖令下達，資本財閥的金融網絡遭到強行凍結，物資無法進出要塞大樓，局勢陷入僵持。此時，高層之間的金融與科技大戰讓管理力出現真空。", choices: { A: { label: "⚡ 方案甲：自行整合街區物資，建立民間物資交換所", effect: (state) => { state.teams.D.stability += 15; state.teams.D.funds -= 10; state.teams.A.tech -= 10; } }, B: { label: "⚡ 方案乙：暗中為物資匱乏的資本大樓運送設備換現金", effect: (state) => { state.teams.D.funds += 20; state.teams.D.tech -= 10; state.teams.C.tech += 10; } } } },
                "Sci_A_C_B_B": { text: "政府為了盡快恢復對城市的控制，強制將無電可用、缺乏物資的勞工成批徵調至工地。底層市民面臨著沉重的勞動壓力，而另一邊，資本的要塞大樓依然冷眼旁觀。", choices: { A: { label: "⚡ 方案甲：積極配合官方修復工作，成為重建核心主力", effect: (state) => { state.teams.D.stability += 15; state.teams.D.funds += 10; state.teams.A.tech += 15; } }, B: { label: "⚡ 方案乙：在工地上消極應付，將技術工具轉賣給資本", effect: (state) => { state.teams.D.funds += 20; state.teams.D.tech -= 15; state.teams.C.tech += 10; } } } },
                "Sci_A_D_A_A": { text: "街頭的黑煙被鐵腕執法強行驅散，空氣雖然恢復了乾淨，但勞工階級再度陷入了無電、無熱能的瀕死極寒中。政府雖然短暫奪回了秩序，但自身也面臨資源耗盡的窘境。", choices: { A: { label: "⚡ 方案甲：啟動乾淨能源發電向瀕死勞工開出天價訂閱", effect: (state) => { state.teams.C.funds += 10; state.teams.A.funds -= 10; state.teams.D.stability -= 10; } }, B: { label: "⚡ 方案乙：將電力用來啟動自動防衛系統打造極樂淨土", effect: (state) => { state.teams.C.funds -= 20; state.teams.C.stability += 20; state.teams.A.tech -= 15; } } } },
                "Sci_A_D_A_B": { text: "儘管勞工靠著燒煤勉強恢復了體溫，但隨即被政府的執法隊強行押上工地。大批勞工在黑煙與寒冬中被迫進行高強度的無酬勞動。城市的公共線路正在政府的強壓下緩慢重組...", choices: { A: { label: "⚡ 方案甲：向急於完工的政府與勞工高價租售重型機具", effect: (state) => { state.teams.C.funds += 10; state.teams.A.funds -= 15; state.teams.D.stability -= 10; } }, B: { label: "⚡ 方案乙：砸下資產將剩餘電力啟動總部自動防衛系統", effect: (state) => { state.teams.C.funds -= 10; state.teams.C.stability += 15; state.teams.A.tech -= 15; } } } },
                "Sci_A_D_B_A": { text: "隨著政府的鐵腕戒嚴令下達，街頭的罷工運動遭到強力鎮壓，工廠被強行重啟。公共秩序被表面上壓制，但勞工階級在失去談判籌碼後，再度陷入了高壓與匱乏的絕境。", choices: { A: { label: "⚡ 方案甲：順水推舟，將生產出來的乾淨能源高價壟斷", effect: (state) => { state.teams.C.funds += 15; state.teams.A.funds -= 10; state.teams.D.stability -= 10; } }, B: { label: "⚡ 方案乙：將復工產能與資金全投入武裝與電磁屏障", effect: (state) => { state.teams.C.funds -= 10; state.teams.C.stability += 20; state.teams.A.tech -= 15; } } } },
                "Sci_A_D_B_B": { text: "政府的鐵腕徵調令打破了勞資雙方的僵局，強行將大批勞工押送至國家基建工地進行高強度的無酬勞動。而在另一邊，資本財閥的自動化產線因為失去了勞工維護而繼續停擺。", choices: { A: { label: "⚡ 方案甲：向急於完工的政府與勞工高價租售重型機具", effect: (state) => { state.teams.C.funds += 10; state.teams.A.funds -= 15; state.teams.D.stability -= 10; } }, B: { label: "⚡ 方案乙：砸下資產將剩餘電力啟動總部自動防衛系統", effect: (state) => { state.teams.C.funds -= 10; state.teams.C.stability += 15; state.teams.A.tech -= 15; } } } },
                "Sci_B_C_A_A": { text: "由於政府的價格管制，資本試圖壟斷硬體零件的計畫被強行制止。此時市場上的核心晶片與變壓器價格回歸穩定。意味著勞工不僅擁有應變代碼，也能以合理的成本取得實體材料。", choices: { A: { label: "⚡ 方案甲：利用零件與代碼搭建去中心化微型供電網", effect: (state) => { state.teams.D.stability += 20; state.teams.D.funds -= 10; state.teams.A.tech -= 10; } }, B: { label: "⚡ 方案乙：率先恢復實體生產供應更廉價電子產品", effect: (state) => { state.teams.D.funds += 5; state.teams.D.tech += 10; state.teams.C.tech -= 10; } } } },
                "Sci_B_C_A_B": { text: "政府為了盡快恢復對城市的控制，無視資本財閥的價格戰，強制將大批無電可用、缺乏物資的勞工徵調至工地進行無酬搶修。而在另一邊，科學家的開源代碼依舊在終端機上閃爍。", choices: { A: { label: "⚡ 方案甲：積極配合官方的修復工作，成為重建核心主力", effect: (state) => { state.teams.D.stability += 15; state.teams.D.funds += 10; state.teams.A.tech += 15; } }, B: { label: "⚡ 方案乙：在工餘時間改良設備率先恢復更廉價產品", effect: (state) => { state.teams.D.funds += 5; state.teams.D.tech += 10; state.teams.C.tech -= 10; } } } },
                "Sci_B_C_B_A": { text: "雖然中央電網依然癱瘓，但政府的強力介入打破了科學家與資本的技術壟斷計畫。官方宣布所有新型電力協議必須收歸國有，這讓財閥受到限制，但也意味著新技術將轉為公共資產。", choices: { A: { label: "⚡ 方案甲：利用穩定的零件與代碼搭建微型供電網", effect: (state) => { state.teams.D.stability += 20; state.teams.D.funds -= 10; state.teams.A.tech -= 10; } }, B: { label: "⚡ 方案乙：在工餘時間改良設備率先恢復更廉價產品", effect: (state) => { state.teams.D.funds += 5; state.teams.D.tech += 10; state.teams.C.tech -= 10; } } } },
                "Sci_B_C_B_B": { text: "儘管科學家與資本達成了新技術的戰略結盟，但政府對此不予理會，直接將勞工成批徵調至舊電網工地。底層市民在缺乏物資與寒冷的環境下面臨著沉重的勞動壓力。", choices: { A: { label: "⚡ 方案甲：積極配合官方的修復工作，成為重建核心主力", effect: (state) => { state.teams.D.stability += 15; state.teams.D.funds += 10; state.teams.A.tech += 15; } }, B: { label: "⚡ 方案乙：在工餘時間改良設備率先恢復更廉價產品", effect: (state) => { state.teams.D.funds += 5; state.teams.D.tech += 10; state.teams.C.tech -= 10; } } } },
                "Sci_B_D_A_A": { text: "街頭上私接的霓虹燈再度熄滅，政府的強力介入打破了勞工的免費電力美夢。與此同時，資本財閥驚覺自己被偷接的電纜雖然被官方切斷，但這套技術資產現在居然落入了政府手中。", choices: { A: { label: "⚡ 方案甲：瘋狂財政索賠並大幅調高剩餘私有能源價格", effect: (state) => { state.teams.C.funds += 10; state.teams.A.funds -= 15; state.teams.D.stability -= 20; } }, B: { label: "⚡ 方案乙：砸下巨資將大樓轉化為全封閉武裝堡壘", effect: (state) => { state.teams.C.funds -= 15; state.teams.C.stability += 20; state.teams.A.tech -= 15; } } } },
                "Sci_B_D_A_B": { text: "雖然勞工靠著盜接財閥的電力點亮了街區，但這大張旗鼓的通電也引來了執法隊，強行將大批勞工押解至官方工地。勞工階級在寒冬中被迫進行高強度的無酬基建搶修。", choices: { A: { label: "⚡ 方案甲：向政府與瀕臨極限的勞工高價租售工程機具", effect: (state) => { state.teams.C.funds += 15; state.teams.A.funds -= 15; state.teams.D.stability -= 10; } }, B: { label: "⚡ 方案乙：砸下資產將剩餘電力啟動總部自動防衛系統", effect: (state) => { state.teams.C.funds -= 10; state.teams.C.stability += 15; state.teams.A.tech -= 15; } } } },
                "Sci_B_D_B_A": { text: "街頭的地下黑市在警笛聲中被砸毀、查抄，政府用鐵腕手段強行切斷了底層的加密通訊。然而，這場雷厲風行的掃蕩，讓勞工階級剛剛賺到手的黑市財富與非法電力外掛瞬間化為烏有。", choices: { A: { label: "⚡ 方案甲：發企業特赦卡招募走投無路黑客進研發部", effect: (state) => { state.teams.C.tech += 20; state.teams.C.funds -= 15; state.teams.A.stability -= 15; state.teams.D.funds += 10; } }, B: { label: "⚡ 方案乙：主動送上應急資金換取電網與監控主控權", effect: (state) => { state.teams.C.funds -= 20; state.teams.C.tech += 15; state.teams.A.funds += 10; state.teams.A.tech -= 20; } } } },
                "Sci_B_D_B_B": { text: "警笛聲響徹底層，政府的徵調令將勞工中最強大的技術核心一網打盡。大批民間黑客被迫在荷槍實彈的監督下，不眠不休地為官方重組國家監控電網。", choices: { A: { label: "⚡ 方案甲：利用衛星將勞工被持槍看守的畫面瘋狂擴散", effect: (state) => { state.teams.C.stability += 20; state.teams.C.tech += 10; state.teams.A.stability -= 20; state.teams.D.stability += 5; } }, B: { label: "⚡ 方案乙：提前拋售做空城市實體資產與貨幣換硬通貨", effect: (state) => { state.teams.C.funds += 20; state.teams.C.stability -= 15; state.teams.D.stability -= 10; state.teams.A.funds -= 10; } } } }
            }
        };

        let systemState = JSON.parse(JSON.stringify(initialSystemState));
        let cloudOnline = false;

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'team';
        const teamKey = urlParams.get('team') || 'A';
        const mainView = document.getElementById('mainView');

        let isLocked = false;
        let sseSource = null;

        function updateNetIndicator(isOK) {
            cloudOnline = isOK;
            const badge = document.getElementById('netIndicator');
            if (badge) {
                if(isOK) {
                    badge.innerText = "🌐 雲端連線正常";
                    badge.className = "net-status-badge";
                } else {
                    badge.innerText = "⚠️ 雲端斷線/更新中...";
                    badge.className = "net-status-badge fail";
                }
            }
        }

        function startSSESync() {
            if (sseSource) { sseSource.close(); }
            sseSource = new EventSource(`${API_URL}/sse`);
            sseSource.onmessage = (event) => {
                try {
                    const packet = JSON.parse(event.data);
                    if (packet.event === 'message' && packet.message) {
                        const incomingState = JSON.parse(packet.message);
                        if (incomingState && incomingState.teams && incomingState.rounds && typeof incomingState.version === 'number') {
                            if (incomingState.version > systemState.version) {
                                systemState = incomingState;
                                executeRender();
                            }
                        }
                    }
                    updateNetIndicator(true);
                } catch (e) {}
            };
            sseSource.onerror = () => { updateNetIndicator(false); };
        }

        async function fetchStateOnce() {
            try {
                const res = await fetch(`${API_URL}/json?poll=1`, { cache: "no-store" });
                if (res.ok) {
                    const text = await res.text();
                    if(text && text.trim()) {
                        const lines = text.trim().split('\n');
                        let latest = null;
                        for (let line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const packet = JSON.parse(line);
                                if (packet.event === 'message' && packet.message) {
                                    const state = JSON.parse(packet.message);
                                    if (state && state.teams && state.rounds && (!latest || state.version > latest.version)) {
                                        latest = state;
                                    }
                                }
                            } catch(e){}
                        }
                        if (latest && latest.version > systemState.version) {
                            systemState = latest;
                        }
                    }
                    updateNetIndicator(true);
                }
            } catch (e) { updateNetIndicator(false); }
        }

        async function mutateAndSyncState(mutationFn) {
            if (isLocked) return;
            isLocked = true; 
            setButtonsDisabled(true);

            try {
                mutationFn();
                if (systemState.logs && systemState.logs.length > 12) {
                    systemState.logs = systemState.logs.slice(0, 12);
                }
                systemState.version = (systemState.version || 0) + 1;
                executeRender(); 
            } catch (e) {}

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(systemState),
                    cache: "no-store"
                });
                updateNetIndicator(true);
            } catch (e) { updateNetIndicator(false); } finally {
                isLocked = false;
                setButtonsDisabled(false);
            }
        }

        function executeRender() {
            if (mode !== 'host') renderTeamView();
            else renderHostView();
        }

        function setButtonsDisabled(disabled) {
            const inputs = document.querySelectorAll('button, select');
            inputs.forEach(el => { el.disabled = disabled; });
        }

        async function triggerManualSync() {
            const btn = document.getElementById('panelSyncBtn');
            if(btn) { btn.innerText = "⏳ 同步中..."; btn.style.background = "#ff7300"; }
            await fetchStateOnce();
            executeRender();
            startSSESync();
            setTimeout(() => {
                if(btn) {
                    btn.innerText = "✅ 已同步"; btn.style.background = "#ffffff";
                    setTimeout(() => { btn.innerText = "⚡ 強制重整"; btn.style.background = "#00ffaa"; }, 400);
                }
            }, 100);
        }

        (async () => {
            if (mode === 'host') {
                document.getElementById('mainContainer').style.display = "block";
                document.body.className = "";
            } else {
                document.body.className = `theme-${teamKey}`;
            }
            await fetchStateOnce();
            executeRender();
            startSSESync();
        })();

        function submitChoice(choice) {
            mutateAndSyncState(() => {
                const rData = systemState.rounds[systemState.currentRound];
                const turnOrder = [rData.w1, rData.w2, rData.l1, rData.l2];
                const activeTeam = turnOrder[rData.currentTurnIdx];
                const firstFaction = turnOrder[0];
                rData.history.push(choice);
                
                let effectFn = null;
                try {
                    const pathHist = rData.history;
                    const prefix = firstFaction === 'B' ? 'Sci_' : '';
                    if (rData.currentTurnIdx === 0) {
                        const choicesObj = firstFaction === 'B' ? round1Content[0].Sci : round1Content[0].choices;
                        effectFn = choicesObj[choice]?.effect;
                    } else if (rData.currentTurnIdx === 1) {
                        const pathKey = `${prefix}${pathHist[0]}`;
                        effectFn = round1Content[1][pathKey]?.choices[activeTeam]?.[choice]?.effect;
                    } else if (rData.currentTurnIdx === 2) {
                        const secFaction = turnOrder[1];
                        const pathKey = `${prefix}${pathHist[0]}_${secFaction}_${pathHist[1]}`;
                        effectFn = round1Content[2][pathKey]?.choices[choice]?.effect;
                    } else if (rData.currentTurnIdx === 3) {
                        const secFaction = turnOrder[1];
                        const pathKey = `${prefix}${pathHist[0]}_${secFaction}_${pathHist[1]}_${pathHist[2]}`;
                        effectFn = round1Content[3][pathKey]?.choices[choice]?.effect;
                    }
                    
                    if (effectFn) effectFn(systemState);
                } catch(e) {}
                
                systemState.logs.unshift(`[SYSTEM] ${systemState.teams[teamKey].textName} 執行了 ${choice === 'A' ? '方案甲' : '方案乙'}`);
                rData.currentTurnIdx++;
                if (rData.currentTurnIdx > 3) rData.status = '決策結束';
            });
        }

        function renderTeamView() {
            const data = systemState.teams[teamKey] || initialTeamsData[teamKey];
            const rIdx = systemState.currentRound || 1;
            const rData = systemState.rounds[rIdx];
            
            let identityText = "";
            let statusText = "";
            let canAction = false;
            let btnALabel = "⚡ 方案甲：因果建構";
            let btnBLabel = "⚡ 方案乙：逆流破壞";

            if (rData.status === '闖關中') {
                identityText = "<span style='color:#00ffaa'>【🎮 關卡挑戰階段】</span>";
                let bgText = (rIdx === 1) ? round1Content.background : "📊 正在進行關卡闖關！請全力在關卡中取得優勢。";
                statusText = `<div style="text-align:left; background:rgba(0,0,0,0.4); padding:10px; border-left:3px solid #00ffaa; margin-bottom:12px;">${bgText}</div>📢 等待主持人結算並廣播本輪順位...`;
                canAction = false;
            } else {
                if (!rData.history) rData.history = [];
                const turnOrder = [rData.w1, rData.w2, rData.l1, rData.l2];
                
                if (rData.currentTurnIdx > 3) {
                    identityText = "<span style='color:#ffffff; opacity: 0.5;'>【🔚 本輪選擇已結束】</span>";
                    statusText = `請等待主持人切換至下一輪關卡！`;
                    canAction = false;
                } else {
                    const activeTeamNow = turnOrder[rData.currentTurnIdx];
                    const activeTeamName = systemState.teams[activeTeamNow]?.textName || "";
                    
                    if (teamKey === rData.w1) identityText = "<span style='color:#ffb700'>【👑 第一順位】</span>";
                    else if (teamKey === rData.w2) identityText = "<span style='color:#00ffaa'>【✨ 第二順位】</span>";
                    else if (teamKey === rData.l1) identityText = "<span style='color:#ff5555'>【⚠️ 第三順位】</span>";
                    else if (teamKey === rData.l2) identityText = "<span style='color:#ff3333'>【🚨 第四順位】</span>";

                    let currentIntro = `正在等待 [ ${activeTeamName} ] 進行決策選擇。`;
                    
                    if (rIdx === 1) {
                        const firstFaction = turnOrder[0];
                        const prefix = firstFaction === 'B' ? 'Sci_' : '';

                        if (rData.currentTurnIdx === 0) {
                            currentIntro = firstFaction === 'B' ? round1Content.background_sci : round1Content.background;
                            const choicesObj = firstFaction === 'B' ? round1Content[0].Sci : round1Content[0].choices;
                            btnALabel = choicesObj.A.label;
                            btnBLabel = choicesObj.B.label;
                        } else if (rData.currentTurnIdx === 1) {
                            const firstChoice = rData.history[0] || 'A';
                            const pathKey = `${prefix}${firstChoice}`;
                            currentIntro = round1Content[1][pathKey]?.text || "";
                            btnALabel = round1Content[1][pathKey]?.choices[activeTeamNow]?.A?.label || "⚡ 方案甲";
                            btnBLabel = round1Content[1][pathKey]?.choices[activeTeamNow]?.B?.label || "⚡ 方案乙";
                        } else if (rData.currentTurnIdx === 2) {
                            const firstChoice = rData.history[0] || 'A';
                            const secFaction = turnOrder[1];
                            const secChoice = rData.history[1] || 'A';
                            const pathKey = `${prefix}${firstChoice}_${secFaction}_${secChoice}`;
                            currentIntro = round1Content[2][pathKey]?.text || "等待加載...";
                            btnALabel = round1Content[2][pathKey]?.choices?.A?.label || "⚡ 方案甲";
                            btnBLabel = round1Content[2][pathKey]?.choices?.B?.label || "⚡ 方案乙";
                        } else if (rData.currentTurnIdx === 3) {
                            const firstChoice = rData.history[0] || 'A';
                            const secFaction = turnOrder[1];
                            const secChoice = rData.history[1] || 'A';
                            const thirdChoice = rData.history[2] || 'A';
                            const pathKey = `${prefix}${firstChoice}_${secFaction}_${secChoice}_${thirdChoice}`;
                            currentIntro = round1Content[3][pathKey]?.text || "等待加載...";
                            btnALabel = round1Content[3][pathKey]?.choices?.A?.label || "⚡ 方案甲";
                            btnBLabel = round1Content[3][pathKey]?.choices?.B?.label || "⚡ 方案乙";
                        }
                    }

                    if (teamKey === activeTeamNow) {
                        statusText = `<div style="text-align:left; background:rgba(0,0,0,0.4); padding:10px; border-left:3px solid #ffb700; margin-bottom:12px;">${currentIntro}</div>⚠️ 輪到你們進行決策！請選擇應對方案。`;
                        canAction = true;
                    } else {
                        statusText = `<div style="text-align:left; background:rgba(0,0,0,0.4); padding:10px; border-left:3px solid #00f0ff; margin-bottom:12px; color:#aaa;">${currentIntro}</div>⏳ 等待 [ ${activeTeamName} ] 決策中...`;
                        canAction = false;
                    }
                }
            }

            const renderDial = (val, label) => {
                const offset = 157 - (157 * val / 100);
                return `<div class="dial-container">
                    <div class="dial-svg-wrapper">
                        <svg><circle class="dial-bg" cx="36" cy="36" r="25"></circle><circle class="dial-fill" cx="36" cy="36" r="25" style="stroke-dashoffset: ${offset}; stroke: ${val>50?'#00ffaa':val>20?'#ffb700':'#ff3333'};"></circle></svg>
                        <div class="dial-text">${val}</div>
                    </div>
                    <div class="v-bar-label">${label}</div>
                </div>`;
            };

            mainView.innerHTML = `
                <div class="hud-screen">
                    <svg class="hud-border-svg"><rect x="0" y="0" width="100%" height="100%"></rect></svg>
                    
                    <div class="top-left-panel">
                        <div class="team-title">${data.name} <br/> ${identityText}</div>
                    </div>
                    
                    <div class="mid-left-panel">
                        ${renderDial(data.stability, '生命/穩定')}
                        ${renderDial(data.funds, '資產/資金')}
                        ${renderDial(data.tech, '科技/武力')}
                    </div>
                    
                    <div class="center-core">
                        <svg class="radar-group radar-rotate-slow" viewBox="0 0 100 100">
                            <circle class="radar-circle" cx="50" cy="50" r="40" stroke-dasharray="10 5" opacity="0.5"/>
                            <circle class="radar-circle" cx="50" cy="50" r="25" stroke-dasharray="5 5" opacity="0.3"/>
                            <path d="M50 10 L50 90 M10 50 L90 50" stroke="currentColor" opacity="0.3"/>
                        </svg>
                        <svg class="radar-group radar-rotate-fast" viewBox="0 0 100 100" style="position:absolute; top:0; left:0; width:100%; height:100%;">
                            <path d="M50 50 L50 10 A40 40 0 0 1 90 50 Z" fill="currentColor" opacity="0.1"/>
                        </svg>
                    </div>
                    
                    <div class="bottom-left-panel"></div>
                    
                    <div class="top-right-panel">
                        <div class="mission-content">${statusText}</div>
                        <div class="action-box">
                            <button id="btnChoiceA" class="hud-btn" ${!canAction ? 'disabled' : ''}>${btnALabel}</button>
                            <button id="btnChoiceB" class="hud-btn" ${!canAction ? 'disabled' : ''}>${btnBLabel}</button>
                        </div>
                    </div>
                    
                    <div class="bottom-right-panel">
                        <div class="status-line"><span>ROUND: ${rIdx}</span><span>STATUS: ${rData.status}</span></div>
                        <div class="status-line"><span>NET: </span><span id="netIndicator" class="net-status-badge">連接中...</span></div>
                        <button id="panelSyncBtn" class="panel-sync-btn" onclick="triggerManualSync()">⚡ 強制重整</button>
                    </div>
                </div>
            `;

            if (canAction) {
                document.getElementById('btnChoiceA').onclick = () => submitChoice('A');
                document.getElementById('btnChoiceB').onclick = () => submitChoice('B');
            }
        }

        function renderHostView() {
            const html = `
                <div class="host-screen">
                    <div class="host-top-bar">
                        <div class="host-header">MATRIX HOST PANEL <span id="netIndicator" class="sync-indicator">連接中...</span></div>
                        <button class="reset-btn" onclick="hardReset()">⚠️ 重置系統</button>
                    </div>
                    <div class="host-grid">
                        <div class="control-panel-box">
                            <div class="panel-title">賽局控制</div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>當前輪次</label>
                                    <select id="hostRound" class="host-select" onchange="changeRound()">
                                        <option value="1">ROUND 1</option>
                                        <option value="2">ROUND 2</option>
                                        <option value="3">ROUND 3</option>
                                        <option value="4">ROUND 4</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label>關卡狀態</label>
                                    <select id="hostStatus" class="host-select" onchange="changeStatus()">
                                        <option value="闖關中">闖關中</option>
                                        <option value="決策階段">決策階段</option>
                                    </select>
                                </div>
                            </div>
                            <button class="primary-btn" onclick="forceSyncAll()">廣播同步狀態</button>
                        </div>
                        <div class="control-panel-box">
                            <div class="panel-title">各陣營狀態</div>
                            <div class="score-board">
                                ${['A','B','C','D'].map(k => `
                                    <div class="score-card">
                                        <div class="score-card-title">${systemState.teams[k].name}</div>
                                        <div class="score-card-vals"><span>命:${systemState.teams[k].stability}</span><span>財:${systemState.teams[k].funds}</span><span>科:${systemState.teams[k].tech}</span></div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="log-box">${systemState.logs.map(l => `<div>${l}</div>`).join('')}</div>
                        </div>
                    </div>
                </div>
            `;
            mainView.innerHTML = html;
            document.getElementById('hostRound').value = systemState.currentRound;
            document.getElementById('hostStatus').value = systemState.rounds[systemState.currentRound].status;
        }

        window.hardReset = () => { mutateAndSyncState(() => { systemState = JSON.parse(JSON.stringify(initialSystemState)); }); };
        window.changeRound = () => { mutateAndSyncState(() => { systemState.currentRound = parseInt(document.getElementById('hostRound').value); }); };
        window.changeStatus = () => { mutateAndSyncState(() => { systemState.rounds[systemState.currentRound].status = document.getElementById('hostStatus').value; }); };
        window.forceSyncAll = () => { mutateAndSyncState(() => { systemState.logs.unshift("[SYSTEM] 主持人廣播了最新狀態"); }); };
    </script>
</body>
</html>
